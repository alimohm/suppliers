<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول | محجوب أونلاين</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Cairo', sans-serif; }
        .left-side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; background: #fff; }
        .right-side { flex: 1; background: #4b0082; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .login-input { width: 80%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; background: #f9f9fb; }
        .btn-login { width: 80%; padding: 15px; background: #4b0082; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .feature-box { background: rgba(255,255,255,0.1); padding: 15px; margin: 5px; border-radius: 10px; width: 70%; display: flex; align-items: center; }
        img.logo { width: 100px; filter: brightness(0) invert(1); } /* لوجو أبيض */
    </style>
</head>
<body>
    <div class="left-side">
        <h2>تسجيل الدخول</h2>
        <p>مرحباً بك مجدداً في نظامك الإداري الملكي</p>
        <form method="POST" style="width: 100%; text-align: center;">
            <input type="text" name="username" class="login-input" placeholder="اسم المستخدم" required>
            <input type="password" name="password" class="login-input" placeholder="كلمة المرور" required>
            <button type="submit" class="btn-login">دخول للمنصة</button>
        </form>
    </div>
    <div class="right-side">
        <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo">
        <h1>محجوب أونلاين</h1>
        <p>المنصة الأولى لدعم الموردين والنمو الرقمي</p>
        <div class="feature-box">🛡️ اللامركزية متطورة وحوكمة رقمية</div>
        <div class="feature-box">📦 إدارة ذكية لسلاسل الإمداد</div>
        <div class="feature-box">📈 سوقك الذكي للنمو المتسارع</div>
    </div>
</body>
</html>
