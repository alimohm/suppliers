<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | محجوب أونلاين</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root { --royal-purple: #7b2cbf; --beige-soft: #f9f7f2; }
        body {
            background-color: var(--beige-soft);
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }
        .login-container {
            background: #fff; padding: 40px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%; max-width: 400px; text-align: center;
            border-top: 5px solid var(--royal-purple);
        }
        .brand-logo h1 { font-size: 22px; color: var(--royal-purple); margin-bottom: 10px; }
        .brand-desc { font-size: 13px; color: #666; margin-bottom: 30px; line-height: 1.6; }
        
        /* نظام التنبيهات */
        .alert {
            padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 13px;
            text-align: right; border-right: 4px solid; animation: fadeIn 0.4s;
        }
        .alert-danger { background: #fff5f5; color: #e74c3c; border-color: #e74c3c; }
        .alert-warning { background: #fff9db; color: #f39c12; border-color: #f39c12; }

        .input-group { text-align: right; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; color: var(--royal-purple); font-weight: 600; }
        input { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--royal-purple); outline: none; background: #fff; }
        
        .btn-royal {
            width: 100%; padding: 15px; background: var(--royal-purple); color: #fff;
            border: none; border-radius: 12px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-royal:hover { background: #5a189a; transform: translateY(-2px); }

        /* التوافق مع الجوال */
        @media (max-width: 480px) {
            .login-container { padding: 30px 20px; }
            .brand-logo h1 { font-size: 19px; }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand-logo"><h1>محجوب أونلاين | سوقك الذكي</h1></div>
        <div class="brand-desc">المنصة الأولى لحوكمة سلاسل التوريد الرقمية بنظام اللامركزية الذكي.</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <label>معرف المورد</label>
                <input type="text" name="username" placeholder="اسم المستخدم" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-royal">دخول المنصة الملكية</button>
        </form>
    </div>
</body>
</html>
