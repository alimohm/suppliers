<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | محجوب أونلاين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --royal-purple: #4b0082; /* البنفسجي الملكي */
            --pure-white: #ffffff;
            --gold: #ffd700;
        }

        body {
            margin: 0; padding: 0; display: flex; height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--pure-white);
        }

        /* تنسيق الشاشات الكبيرة (كمبيوتر وتابلت عريض) */
        .main-wrapper { display: flex; width: 100%; height: 100%; }

        .brand-side {
            flex: 1.2;
            background: linear-gradient(135deg, #1a0033 0%, var(--royal-purple) 100%);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: white; padding: 40px; text-align: center;
        }

        .logo-login {
            width: 140px; filter: brightness(0) invert(1) !important; /* لوجو أبيض ناصع */
            margin-bottom: 20px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px; border-radius: 12px; margin-bottom: 15px;
            width: 100%; max-width: 400px; display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .feature-card i { color: var(--gold); margin-left: 15px; font-size: 1.2rem; }

        .login-side {
            flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .login-box { width: 100%; max-width: 380px; }
        .login-box h2 { color: #2d0056; font-size: 2rem; margin-bottom: 10px; }

        .input-container { position: relative; margin-bottom: 20px; }
        .input-container i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--royal-purple); }
        
        input {
            width: 100%; padding: 15px 45px 15px 15px; border: 2px solid #f0f0f0;
            border-radius: 10px; font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--royal-purple); background: #f9f5ff; }

        button {
            width: 100%; padding: 15px; background: var(--royal-purple); color: white;
            border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; box-shadow: 0 8px 15px rgba(75,0,130,0.2);
        }

        /* --- التنسيق الذكي للهواتف (Responsive) --- */
        @media (max-width: 850px) {
            body { height: auto; overflow-y: auto; }
            .main-wrapper { flex-direction: column; } /* تحويل الهيكل من أفقي لعمودي */
            
            .brand-side {
                padding: 40px 20px; min-height: 30vh;
                border-radius: 0 0 40px 40px; /* انحناء أنيق للأسفل */
            }
            .brand-side p, .feature-card { display: none; } /* إخفاء التفاصيل لتقليل التمرير */
            .brand-side h1 { font-size: 1.8rem; margin-top: 10px; }
            
            .login-side { padding: 40px 20px; }
            .login-box { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="brand-side">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-login">
            <h1>محجوب أونلاين</h1>
            <p>حوكمة رقمية متطورة وسوق ذكي للموردين</p>
            
            <div class="feature-card">
                <i class="fas fa-microchip"></i>
                <span>اللامركزية متطورة وحوكمة رقمية</span>
            </div>
            <div class="feature-card">
                <i class="fas fa-shipping-fast"></i>
                <span>إدارة ذكية لسلاسل الإمداد</span>
            </div>
        </div>

        <div class="login-side">
            <div class="login-box">
                <h2>تسجيل الدخول</h2>
                <p style="color: #777; margin-bottom: 30px;">مرحباً بك في نظامك الإداري</p>
                
                <form method="POST">
                    <div class="input-container">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" placeholder="اسم المستخدم" required>
                    </div>
                    <div class="input-container">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="كلمة المرور" required>
                    </div>
                    <button type="submit">دخول للمنصة</button>
                </form>
                
                <p style="margin-top: 30px; font-size: 0.8rem; color: #ccc;">
                    © 2026 محجوب أونلاين - حوكمة رقمية رائدة
                </p>
            </div>
        </div>
    </div>

</body>
</html>
