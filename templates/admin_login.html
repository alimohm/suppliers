<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الإدارة | محجوب أونلاين</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid #6f42c1; width: 100%; max-width: 400px; text-align: center; }
        .premium-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .publish-btn { background: #6f42c1; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 style="color: #6f42c1; font-weight: bold;">🔐 دخول الإدارة</h3>
        <p class="text-muted small">مرحباً بك في برج المراقبة</p>
        <form method="POST">
            <input type="text" name="admin_user" class="premium-input" placeholder="اسم المدير" required>
            <input type="password" name="admin_pass" class="premium-input" placeholder="كلمة المرور" required>
            <button type="submit" class="publish-btn">دخول اللوحة 🚀</button>
        </form>
    </div>
</body>
</html>
