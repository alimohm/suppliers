<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الموردين | محجوب أونلاين</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #151515; padding: 40px; border-radius: 15px; border: 1px solid #7b2cbf; width: 320px; text-align: center; }
        h2 { color: #9d4edd; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #7b2cbf; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #9d4edd; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>[ Mahjoub Online ]</h2>
        <p style="font-size: 13px; color: #888;">المنصة اللامركزية - دخول الموردين</p>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn">دخول</button>
        </form>
    </div>
</body>
</html>
