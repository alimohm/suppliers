<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول النظام | محجوب أونلاين</title>
    <style>
        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden;
        }
        .ai-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px);
            padding: 50px; border-radius: 30px;
            border: 1px solid rgba(123, 44, 191, 0.3);
            width: 380px; text-align: center;
            box-shadow: 0 0 50px rgba(123, 44, 191, 0.2);
            position: relative;
        }
        .ai-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #7b2cbf, transparent, #9d4edd);
            z-index: -1; border-radius: 32px; opacity: 0.3;
        }
        .logo-text { font-size: 28px; font-weight: 900; letter-spacing: 2px; color: #9d4edd; margin-bottom: 5px; }
        .slogan { font-size: 12px; color: #888; margin-bottom: 35px; text-transform: uppercase; }
        input {
            width: 100%; padding: 15px; margin: 12px 0; background: rgba(0,0,0,0.5);
            border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: #7b2cbf; box-shadow: 0 0 10px rgba(123, 44, 191, 0.5); }
        .btn-glow {
            width: 100%; padding: 16px; background: #7b2cbf; border: none; color: white;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            transition: 0.4s; text-transform: uppercase; margin-top: 20px;
        }
        .btn-glow:hover { background: #9d4edd; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(123, 44, 191, 0.4); }
    </style>
</head>
<body>
    <div class="ai-card">
        <div class="logo-text">[ Mahjoub Online ]</div>
        <div class="slogan">Smart Market & AI Supply Chain</div>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="معرف المورد" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn-glow">تحليل ودخول النظام</button>
        </form>
    </div>
</body>
</html>
