<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الموردين | محجوب أونلاين</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #7b2cbf; width: 320px; text-align: center; }
        .logo { color: #9d4edd; font-size: 24px; font-weight: bold; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: #7b2cbf; border: none; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">[ Mahjoub Online ]</div>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn">دخول النظام</button>
        </form>
    </div>
</body>
</html>
