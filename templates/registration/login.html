<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الموردين | محجوب أونلاين</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle, #240046 0%, #000000 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px; border-radius: 20px; border: 1px solid #7b2cbf;
            width: 350px; text-align: center; backdrop-filter: blur(10px);
        }
        h2 { color: #9d4edd; margin-bottom: 5px; }
        p { color: #888; font-size: 13px; margin-bottom: 25px; }
        .input-group { text-align: right; margin-bottom: 15px; }
        label { color: #fff; font-size: 14px; display: block; margin-bottom: 5px; }
        input {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444;
            background: rgba(0,0,0,0.5); color: #fff; box-sizing: border-box;
        }
        .btn {
            background: #7b2cbf; color: #fff; border: none; width: 100%;
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        .btn:hover { background: #9d4edd; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>محجوب أونلاين</h2>
        <p>المنصة اللامركزية - بوابة الموردين</p>
        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" name="username" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">دخول المنصة</button>
        </form>
    </div>
</body>
</html>
