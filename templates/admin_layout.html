<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برج المراقبة | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --p-color: #1a0033; /* البنفسجي العميق الذي اخترناه */
            --gold: #FFD700;
            --white: #ffffff;
            --soft-bg: #f4f7f6;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background: var(--soft-bg);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar - القائمة الجانبية الموحدة */
        .sidebar {
            width: 260px;
            background: var(--p-color);
            color: white;
            position: fixed;
            height: 100vh;
            right: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            border-left: 3px solid var(--gold);
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
        }

        /* اللوجو الأبيض الديناميكي */
        .logo-container {
            margin-bottom: 15px;
        }
        
        .logo-img {
            width: 120px;
            height: auto;
            /* سر الحركة الديناميكية واللون الأبيض */
            filter: brightness(0) invert(1); 
            transition: transform 0.3s ease;
        }
        
        .logo-img:hover {
            transform: scale(1.05);
        }

        .nav-links { flex: 1; padding: 10px 0; }
        
        /* النافذة الواحدة المركزية */
        .nav-links a.active {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            text-decoration: none;
            border-right: 5px solid var(--gold);
            font-weight: 700;
            font-size: 16px;
        }

        .nav-links a i { margin-left: 15px; font-size: 18px; }

        .logout-link {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #ff4d4d;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-weight: 700;
        }

        /* المنطقة الرئيسية */
        .main-wrapper {
            margin-right: 260px;
            width: 100%;
        }

        .top-bar {
            height: 70px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .content-area { padding: 30px; }

        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar span, .sidebar-header h3 { display: none; }
            .main-wrapper { margin-right: 80px; }
            .logo-img { width: 50px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-container">
                <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" 
                     class="logo-img" alt="محجوب أونلاين">
            </div>
            <h3 style="font-size: 16px; color: var(--gold); margin: 0; font-weight: 900;">برج المراقبة</h3>
        </div>

        <nav class="nav-links">
            <a href="{{ url_for('admin_dashboard') }}" class="active">
                <i class="fas fa-shield-alt"></i> 
                <span>التحكم السيادي</span>
            </a>
        </nav>

        <a href="{{ url_for('logout') }}" class="logout-link">
            <i class="fas fa-power-off" style="margin-left: 10px;"></i> 
            <span>خروج من النظام</span>
        </a>
    </aside>

    <div class="main-wrapper">
        <header class="top-bar">
            <div class="page-title">
                <span style="color: #888; font-size: 14px;">نظام سوقك الذكي 2026</span>
                <h4 style="margin: 0; color: var(--p-color); font-weight: 900;">إدارة الاعتماد المالي</h4>
            </div>
            
            <div class="user-info" style="display: flex; align-items: center; gap: 12px;">
                <div style="text-align: left;">
                    <div style="font-weight: 900; color: var(--p-color);">{{ username }}</div>
                    <div style="background: var(--gold); padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; text-align: center;">مدير النظام</div>
                </div>
                <i class="fas fa-user-circle fa-2x" style="color: var(--p-color);"></i>
            </div>
        </header>
        
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </div>

</body>
</html>
