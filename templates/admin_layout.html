<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}برج المراقبة{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p-color: #1a0033; --gold: #FFD700; --dark-bg: #0b0b0b; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; display: flex; min-height: 100vh; margin: 0; }
        .sidebar { width: 280px; background: var(--p-color); position: fixed; height: 100vh; right: 0; border-left: 1px solid rgba(255,215,0,0.1); z-index: 1000; }
        .main-wrapper { margin-right: 280px; flex: 1; display: flex; flex-direction: column; }
        .top-bar { height: 70px; background: #121212; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-bottom: 1px solid #222; }
        .nav-link { color: rgba(255,255,255,0.6); padding: 15px 25px; border-radius: 12px; margin: 5px 15px; text-decoration: none; display: flex; align-items: center; }
        .nav-link.active { background: rgba(255,215,0,0.15); color: var(--gold); font-weight: 700; }
        .content-area { padding: 30px; }
        @media (max-width: 992px) { .sidebar { right: -280px; } .main-wrapper { margin-right: 0; } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="p-4 text-center border-bottom border-secondary">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" width="80" style="filter: brightness(0) invert(1);">
            <div class="mt-2 text-gold" style="color: var(--gold); font-size: 11px;">محجوب أونلاين</div>
        </div>
        <nav class="mt-3">
            <a href="{{ url_for('admin_dashboard') }}" class="nav-link {% if request.endpoint == 'admin_dashboard' %}active{% endif %}"><i class="fas fa-th-large me-2"></i> الإحصائيات</a>
            <a href="{{ url_for('vendors_accreditation') }}" class="nav-link {% if request.endpoint == 'vendors_accreditation' %}active{% endif %}"><i class="fas fa-user-shield me-2"></i> الموردين</a>
            <a href="#" class="nav-link"><i class="fas fa-wallet me-2"></i> الرقابة المالية</a>
        </nav>
    </aside>
    <div class="main-wrapper">
        <header class="top-bar">
            <div class="text-gold">نظام الإدارة المركزي</div>
            <div class="bg-dark px-3 py-1 rounded-pill border border-secondary">
                <small>{{ session['username'] if session['username'] else 'علي محجوب' }}</small> <i class="fas fa-crown text-gold"></i>
            </div>
        </header>
        <main class="content-area">{% block content %}{% endblock %}</main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
