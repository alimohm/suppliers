<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}برج المراقبة | محجوب أونلاين - سوقك الذكي{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f4f7f6;
            --white: #ffffff;
            --royal-p: #4b0082; 
            --sidebar-width: 280px;
            --sidebar-collapsed: 85px;
            --danger: #e74c3c;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg-body); display: flex; height: 100vh; overflow: hidden; }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            height: 100%;
            border-left: 1px solid #eef2f3;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            z-index: 1000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
        }

        .brand-container {
            padding: 25px 20px;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #f8f9fa;
        }
        /* اللوجو الجديد بدون خلفية */
        .logo-img { height: 48px; border-radius: 8px; flex-shrink: 0; }
        .brand-details { display: flex; flex-direction: column; line-height: 1.3; }
        /* سوقك الذكي */
        .brand-name { font-weight: 800; color: var(--royal-p); font-size: 15px; }
        /* المنصة الأولى اللامركزية */
        .brand-sub { font-size: 10px; color: #999; font-weight: 600; }

        .menu-list { flex: 1; padding: 20px 0; overflow-y: auto; }
        
        .menu-item {
            display: flex; align-items: center; padding: 14px 20px;
            text-decoration: none; color: #6c757d; font-weight: 700;
            margin: 4px 15px; border-radius: 14px; transition: var(--transition);
            white-space: nowrap; border: 1px solid transparent;
        }
        .menu-item i { font-size: 18px; min-width: 35px; text-align: center; margin-left: 10px; }
        .menu-item:hover { background: rgba(75,0,130,0.04); color: var(--royal-p); transform: translateX(-5px); }
        
        .menu-item.active { 
            background: rgba(75,0,130,0.08); 
            color: var(--royal-p); 
            border-right: 4px solid var(--royal-p);
        }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        .top-header {
            height: 80px; background: var(--white);
            border-bottom: 1px solid #eef2f3;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 99;
        }

        .welcome-msg { 
            font-size: 14px; font-weight: 700; color: #444; 
            border-right: 4px solid var(--royal-p); padding-right: 15px;
        }
        .welcome-msg span { color: var(--royal-p); font-weight: 800; }

        .user-pill {
            display: flex; align-items: center; gap: 12px;
            background: #f8fafc; padding: 8px 18px; border-radius: 50px;
            border: 1px solid #edf2f7;
        }

        .page-content { flex: 1; padding: 30px; overflow-y: auto; background: var(--bg-body); }

        @media (max-width: 1024px) {
            .sidebar { width: var(--sidebar-collapsed); }
            .brand-details, .menu-item span { display: none; }
            .menu-item { justify-content: center; margin: 5px 10px; }
            .menu-item i { margin-left: 0; }
        }
    </style>
</head>
<body>

    <nav class="sidebar shadow-sm">
        <div class="brand-container">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-img" alt="محجوب أونلاين">
            <div class="brand-details">
                <span class="brand-name">محجوب أونلاين | سوقك الذكي</span>
                <span class="brand-sub">المنصة الأولى اللامركزية | السيادة الرقمية</span>
            </div>
        </div>

        <div class="menu-list">
            <a href="{{ url_for('admin_dashboard_route') }}" class="menu-item {% if request.endpoint == 'admin_dashboard_route' %}active{% endif %}">
                <i class="fas fa-shield-alt"></i><span>برج المراقبة</span>
            </a>
            
            <a href="{{ url_for('admin_accounts_route') }}" class="menu-item {% if request.endpoint == 'admin_accounts_route' %}active{% endif %}">
                <i class="fas fa-user-shield"></i><span>إدارة الموردين والاعتماد</span>
            </a>

            <hr style="border: 0; border-top: 1px solid #f1f3f5; margin: 15px 25px;">
            
            <a href="{{ url_for('logout_route') }}" class="menu-item" style="color: var(--danger);">
                <i class="fas fa-power-off"></i><span>خروج آمن</span>
            </a>
        </div>
    </nav>

    <main class="main-wrapper">
        <header class="top-header">
            <div class="welcome-msg">
                مرحباً بك يا سيد | <span>{{ session.get('username', 'علي محجوب') }}</span>
            </div>

            <div class="user-section">
                <div class="user-pill shadow-sm">
                    <span style="font-size: 13px; font-weight: 800; color: var(--royal-p);">ADMIN</span>
                    <i class="fas fa-crown fa-lg" style="color: #f1c40f;"></i>
                </div>
            </div>
        </header>

        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
