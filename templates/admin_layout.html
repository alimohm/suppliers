<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}برج المراقبة | محجوب أونلاين{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --p-color: #1a0033; 
            --gold: #FFD700;
            --white: #ffffff;
            --soft-bg: #f4f7f6;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background: var(--soft-bg);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar - القائمة الجانبية الذكية */
        .sidebar {
            width: 260px;
            background: var(--p-color);
            color: white;
            position: fixed;
            height: 100vh;
            right: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            border-left: 1px solid rgba(255, 215, 0, 0.1);
        }

        .sidebar-header {
            padding: 30px 15px;
            text-align: center;
            position: relative;
        }

        /* لوجو النظام - متغير عبر CSS Filter */
        .logo-img {
            width: 110px;
            height: auto;
            filter: brightness(0) invert(1); 
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .nav-links { flex: 1; padding: 25px 0; }
        
        .nav-link {
            display: flex;
            align-items: center;
            padding: 14px 25px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: 0.3s;
            margin: 4px 15px;
            border-radius: 12px;
            font-size: 14px;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
        }

        /* الحالة النشطة: تتغير ديناميكياً */
        .nav-link.active {
            background: rgba(255, 215, 0, 0.15);
            color: var(--gold);
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .nav-link i { margin-left: 15px; font-size: 18px; width: 25px; text-align: center; }

        /* المحتوى الرئيسي */
        .main-wrapper {
            margin-right: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0; 
            transition: var(--transition);
        }

        .top-bar {
            height: 80px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.04);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .content-area {
            padding: 35px;
            flex: 1;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* معلومات المستخدم (متغيرات) */
        .user-badge {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #fafafa;
            padding: 8px 15px;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        /* زر الخروج */
        .logout-section {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .logout-link {
            color: #ff6b6b;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-weight: 700;
            padding: 12px 25px;
            transition: 0.3s;
            border-radius: 10px;
        }

        .logout-link:hover { background: rgba(255, 107, 107, 0.1); }

        /* التجاوب مع الهواتف */
        @media (max-width: 992px) {
            .sidebar { width: 85px; }
            .sidebar span, .sidebar-header h3 { display: none; }
            .main-wrapper { margin-right: 85px; }
            .nav-link { justify-content: center; margin: 8px; }
            .nav-link i { margin-left: 0; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" 
                 class="logo-img" alt="محجوب أونلاين">
            <h3 style="font-size: 12px; color: var(--gold); margin: 0; font-weight: 800;">برج المراقبة</h3>
        </div>

        <nav class="nav-links">
            <a href="{{ url_for('admin_dashboard') }}" class="nav-link {% if request.endpoint == 'admin_dashboard' %}active{% endif %}">
                <i class="fas fa-th-large"></i> 
                <span>لوحة التحكم</span>
            </a>

            <a href="{{ url_for('vendors_accreditation') }}" class="nav-link {% if request.endpoint == 'vendors_accreditation' %}active{% endif %}">
                <i class="fas fa-user-shield"></i> 
                <span>اعتماد الموردين</span>
            </a>

            <a href="#" class="nav-link">
                <i class="fas fa-wallet"></i> 
                <span>العمليات المالية</span>
            </a>
        </nav>

        <div class="logout-section">
            <a href="{{ url_for('logout') }}" class="logout-link">
                <i class="fas fa-sign-out-alt" style="margin-left: 10px;"></i> 
                <span>خروج آمن</span>
            </a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="top-bar">
            <div style="font-weight: 900; color: var(--p-color); font-size: 18px; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-broadcast-tower" style="color: var(--gold);"></i>
                <span>نظام محجوب أونلاين <small style="font-size: 10px; opacity: 0.5;">v3.0</small></span>
            </div>
            
            <div class="user-badge">
                <div style="text-align: left; line-height: 1.2;">
                    <div style="font-weight: 800; font-size: 14px; color: var(--p-color);">{{ username }}</div>
                    <span style="font-size: 9px; color: #777; font-weight: 700;">مدير سيادي</span>
                </div>
                <div style="width: 35px; height: 35px; background: var(--p-color); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--gold);">
                    <i class="fas fa-crown" style="font-size: 14px;"></i>
                </div>
            </div>
        </header>
        
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </div>

</body>
</html>
