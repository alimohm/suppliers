{% extends "layout.html" %}
{% block content %}
<div class="admin-container" style="padding: 20px; color: white; direction: rtl;">
    <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #FFD700; padding-bottom: 15px;">
        <h2><i class="fas fa-tower-observation"></i> بوابة الإدارة المركزية</h2>
        <div class="admin-badge" style="background: #FFD700; color: #1a0033; padding: 5px 15px; border-radius: 50px; font-weight: bold;">
            أهلاً، سيد علي
        </div>
    </header>

    <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;">
        <div class="stat-card" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center;">
            <i class="fas fa-users-viewfinder" style="font-size: 30px; color: #FFD700;"></i>
            <h3>الموردين النشطين</h3>
            <p style="font-size: 24px; font-weight: bold;">{{ vendor_count }}</p>
        </div>
        <div class="stat-card" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center;">
            <i class="fas fa-server" style="font-size: 30px; color: #00ff88;"></i>
            <h3>حالة السيرفر</h3>
            <p>مستقر (سيادي)</p>
        </div>
    </div>
</div>
{% endblock %}
