<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الشركاء | محجوب أونلاين</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f0f12;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #16161a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .brand-logo {
            color: #f39c12;
            font-weight: bold;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            background: #0f0f12;
            border: 1px solid #2a2a2a;
            color: white;
            padding: 12px;
        }
        .form-control:focus {
            background: #0f0f12;
            border-color: #f39c12;
            color: white;
            box-shadow: none;
        }
        .btn-vendor {
            background: #f39c12;
            color: black;
            font-weight: bold;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">
            MAHJOUB <br>
            <small class="text-muted" style="font-size: 0.8rem;">بوابة الموردين والشركاء</small>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-danger small py-2">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('vendor_login') }}" method="POST">
            <div class="mb-3">
                <label class="text-muted small mb-2">اسم المستخدم</label>
                <input type="text" name="username" class="form-control" placeholder="أدخل اسم الحساب" required>
            </div>
            <div class="mb-4">
                <label class="text-muted small mb-2">كلمة المرور</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-vendor">دخول المنصة</button>
        </form>
        
        <div class="text-center mt-4">
            <a href="{{ url_for('admin_login') }}" class="text-muted small text-decoration-none">دخول الإدارة العليا</a>
        </div>
    </div>

</body>
</html>
