{% extends "layout.html" %}

{% block title %}إضافة منتج جديد{% endblock %}

{% block content %}
<div class="add-product-container" style="max-width: 800px; margin: 0 auto;">
    <div class="card" style="background: white; padding: 30px; border-radius: 15px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
        <h3 style="margin-top: 0; color: var(--main-p-color); border-bottom: 2px solid var(--bg-body); padding-bottom: 15px;">
            <i class="fas fa-plus-circle"></i> إدراج منتج في سلسلة الإمداد
        </h3>

        <form action="/add_product" method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="input-group">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">اسم المنتج</label>
                <input type="text" name="product_name" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Cairo';">
            </div>

            <div class="row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">السعر (MAH)</label>
                    <input type="number" step="0.01" name="price" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">صورة المنتج</label>
                    <input type="file" name="product_image" accept="image/*" style="width: 100%; padding: 8px;">
                </div>
            </div>

            <div class="input-group">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">وصف المنتج</label>
                <textarea name="description" rows="4" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Cairo';"></textarea>
            </div>

            <button type="submit" style="background: var(--main-p-color); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-family: 'Cairo'; font-weight: 700; transition: 0.3s;">
                تأكيد الرفع للمنصة اللامركزية
            </button>
        </form>
    </div>
</div>
{% endblock %}
