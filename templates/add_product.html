{% extends "layout.html" %}

{% block title %}رفع منتج احترافي | محجوب أونلاين{% endblock %}

{% block content %}
<style>
    .upload-card {
        background: var(--white);
        padding: 35px;
        border-radius: 30px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.02);
        max-width: 850px;
        margin: 20px auto;
        border: 1px solid #eef2f3;
    }

    .form-section-title {
        font-size: 18px;
        font-weight: 800;
        color: var(--main-p-color);
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 2px solid #f8f5ff;
        padding-bottom: 15px;
    }

    .media-upload-area {
        border: 2px dashed #d1d8e0;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        background: #fcfcfc;
    }

    .media-upload-area:hover { border-color: var(--main-p-color); background: #f8f5ff; }

    .form-control {
        width: 100%;
        padding: 14px 18px;
        border: 1px solid #eef2f3;
        border-radius: 14px;
        font-family: 'Cairo', sans-serif;
        margin-top: 10px;
        background: #fdfdfd;
        font-size: 14px;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: var(--main-p-color);
        outline: none;
        box-shadow: 0 5px 15px rgba(75, 0, 130, 0.05);
    }

    .ai-gen-btn {
        background: linear-gradient(45deg, #4b0082, #6a11cb);
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    #successToast {
        position: fixed;
        bottom: 30px;
        left: 30px;
        background: #27ae60;
        color: white;
        padding: 18px 30px;
        border-radius: 15px;
        display: none;
        box-shadow: 0 15px 30px rgba(39, 174, 96, 0.3);
        z-index: 9999;
        font-weight: 700;
        animation: slideIn 0.5s ease;
    }

    @keyframes slideIn { from { transform: translateX(-120%); } to { transform: translateX(0); } }

    .submit-btn {
        width: 100%;
        background: var(--main-p-color);
        color: white;
        border: none;
        padding: 18px;
        border-radius: 15px;
        font-weight: 800;
        font-size: 17px;
        cursor: pointer;
        margin-top: 20px;
    }
</style>

<div class="upload-card">
    <div class="form-section-title">
        <i class="fas fa-boxes"></i> إدارة المخزون والمنتجات الذكية
    </div>

    <form id="productForm" enctype="multipart/form-data">
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 25px;">
            <div>
                <label style="font-weight: 800;">اسم المنتج</label>
                <input type="text" id="prodName" name="name" class="form-control" placeholder="أدخل اسم المنتج..." required>
            </div>
            <div>
                <label style="font-weight: 800;">مجموعة المنتج</label>
                <select name="category" class="form-control" required>
                    <option value="">اختر المجموعة...</option>
                    <option value="electronics">إلكترونيات</option>
                    <option value="fashion">أزياء وملابس</option>
                    <option value="home">مستلزمات منزلية</option>
                    <option value="food">مواد غذائية</option>
                </select>
            </div>
        </div>

        <div style="margin-bottom: 25px;">
            <label style="font-weight: 800;">الصور والفيديوهات</label>
            <div class="media-upload-area" onclick="document.getElementById('mediaInput').click()">
                <i class="fas fa-photo-video fa-3x"></i>
                <p style="margin-top: 10px; font-size: 14px; color: #7f8c8d;">اضغط لرفع صور وفيديوهات المنتج</p>
                <input type="file" id="mediaInput" name="media" multiple accept="image/*,video/*" style="display: none;">
            </div>
            <div id="filePreview" style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px;">
            <div>
                <label style="font-weight: 800;">السعر</label>
                <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
            </div>
            <div>
                <label style="font-weight: 800;">العملة</label>
                <select name="currency" class="form-control">
                    <option value="YER">ريال يمني</option>
                    <option value="SAR">ريال سعودي</option>
                    <option value="USD">دولار أمريكي</option>
                </select>
            </div>
            <div>
                <label style="font-weight: 800;">الكمية المتوفرة</label>
                <input type="number" name="stock" class="form-control" placeholder="مثال: 50" required>
            </div>
        </div>

        <div style="margin-bottom: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="font-weight: 800;">وصف المنتج</label>
                <button type="button" class="ai-gen-btn" onclick="generateAIDescription()">
                    <i class="fas fa-robot"></i> توليد وصف تلقائي
                </button>
            </div>
            <textarea id="prodDesc" name="description" class="form-control" rows="5" placeholder="تفاصيل المنتج..."></textarea>
        </div>

        <button type="submit" class="submit-btn">
            <i class="fas fa-rocket"></i> نشر المنتج للادارة فوراً
        </button>
    </form>
</div>

<div id="successToast">
    <i class="fas fa-check-circle"></i> تم تحديث المخزون ورفع المنتج بنجاح!
</div>

<script>
    function generateAIDescription() {
        const name = document.getElementById('prodName').value;
        const descBox = document.getElementById('prodDesc');
        if(!name) return alert("اكتب الاسم أولاً");
        descBox.value = "جاري التوليد...";
        setTimeout(() => {
            descBox.value = `نقدم لكم ${name}، منتج عالي الجودة متوفر الآن ضمن مجموعتنا المختارة في "سوقك الذكي". يتميز بمواصفات احترافية تضمن لك أفضل تجربة استخدام.`;
        }, 800);
    }

    document.getElementById('productForm').onsubmit = function(e) {
        e.preventDefault();
        document.getElementById('successToast').style.display = 'block';
        setTimeout(() => { document.getElementById('successToast').style.display = 'none'; }, 4000);
        
        const formData = new FormData(this);
        fetch("{{ url_for('add_product') }}", { method: 'POST', body: formData });
        this.reset();
        document.getElementById('filePreview').innerHTML = '';
    };

    document.getElementById('mediaInput').onchange = function() {
        const preview = document.getElementById('filePreview');
        preview.innerHTML = '';
        Array.from(this.files).forEach(f => {
            const s = document.createElement('span');
            s.style.cssText = "font-size: 11px; background: #eee; padding: 5px 10px; border-radius: 8px;";
            s.innerText = f.name;
            preview.appendChild(s);
        });
    };
</script>
{% endblock %}
