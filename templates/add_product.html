{% extends "layout.html" %}

{% block title %}رفع منتج ذكي | محجوب أونلاين{% endblock %}

{% block content %}
<style>
    .upload-card {
        background: var(--white);
        padding: 35px;
        border-radius: 30px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.02);
        max-width: 850px;
        margin: 20px auto;
        border: 1px solid #eef2f3;
    }

    .form-section-title {
        font-size: 18px;
        font-weight: 800;
        color: var(--main-p-color);
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 2px solid #f8f5ff;
        padding-bottom: 15px;
    }

    .form-control {
        width: 100%;
        padding: 14px 18px;
        border: 1px solid #eef2f3;
        border-radius: 14px;
        font-family: 'Cairo', sans-serif;
        margin-top: 10px;
        background: #fdfdfd;
        font-size: 14px;
        transition: 0.3s;
    }

    /* مساعد الكتابة الذكي - الأداة الوحيدة */
    .ai-tool-container {
        background: #f8f5ff;
        border: 2px dashed #6a11cb;
        padding: 20px;
        border-radius: 20px;
        margin: 20px 0;
        text-align: center;
    }

    .ai-gen-btn {
        background: linear-gradient(45deg, #4b0082, #6a11cb);
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }

    .submit-btn {
        width: 100%;
        background: var(--main-p-color);
        color: white;
        border: none;
        padding: 18px;
        border-radius: 15px;
        font-weight: 800;
        font-size: 17px;
        cursor: pointer;
        margin-top: 20px;
    }

    .modal-content { border-radius: 25px; border: none; }
    .modal-header { border-bottom: 1px solid #eee; padding: 20px; }
</style>

<div class="upload-card">
    <div class="form-section-title">
        <i class="fas fa-plus-circle"></i> إضافة منتج جديد للمنصة
    </div>

    <form id="productForm" action="{{ url_for('add_product') }}" method="POST" enctype="multipart/form-data">
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label style="font-weight: 800;">اسم المنتج</label>
                <input type="text" id="prodName" name="name" class="form-control" placeholder="أدخل اسم المنتج..." required>
            </div>
            <div>
                <label style="font-weight: 800;">الفئة</label>
                <select name="category" class="form-control">
                    <option value="electronics">إلكترونيات</option>
                    <option value="fashion">أزياء</option>
                    <option value="home">منزل</option>
                </select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
            <div>
                <label style="font-weight: 800;">السعر</label>
                <input type="number" name="price" class="form-control" placeholder="0.00" required>
            </div>
            <div>
                <label style="font-weight: 800;">العملة</label>
                <select name="currency" class="form-control">
                    <option value="SAR">ريال سعودي</option>
                    <option value="YER">ريال يمني</option>
                </select>
            </div>
            <div>
                <label style="font-weight: 800;">الكمية</label>
                <input type="number" name="stock" class="form-control" placeholder="مثال: 100" required>
            </div>
        </div>

        <div class="ai-tool-container">
            <p style="color: #4b0082; font-weight: 800; margin-bottom: 10px;">✨ مساعد الكتابة الذكي</p>
            <button type="button" class="ai-gen-btn" data-bs-toggle="modal" data-bs-target="#aiModal">
                <i class="fas fa-magic"></i> توليد الوصف بالمواصفات
            </button>
        </div>

        <div style="margin-top: 20px;">
            <label style="font-weight: 800;">وصف المنتج (النتيجة)</label>
            <textarea id="prodDesc" name="description" class="form-control" rows="5" placeholder="سيتم تعبئة هذا المربع تلقائياً عند استخدام المساعد الذكي..."></textarea>
        </div>

        <div style="margin-top: 20px;">
            <label style="font-weight: 800;">صورة المنتج</label>
            <input type="file" name="image" class="form-control" accept="image/*">
        </div>

        <button type="submit" class="submit-btn">
            <i class="fas fa-rocket"></i> نشر المنتج الآن
        </button>
    </form>
</div>

<div class="modal fade" id="aiModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title font-weight-bold">توليد محتوى ذكي ✨</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label font-weight-bold">المواصفات الأساسية:</label>
                    <textarea id="aiSpecs" class="form-control" rows="3" placeholder="مثلاً: شاشة OLED، بطارية تدوم 24 ساعة، مقاوم للماء..."></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label font-weight-bold">أسلوب الكتابة:</label>
                    <select id="aiStyle" class="form-control">
                        <option value="خبير">👨‍🏫 خبير (تركيز على التفاصيل التقنية)</option>
                        <option value="احترافي">💼 احترافي (رسمي وتسويقي)</option>
                        <option value="ودي">😊 ودي (جذاب وقريب للمستهلك)</option>
                        <option value="بسيط">📝 بسيط (واضح ومباشر)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="submit-btn" style="margin:0" onclick="runSmartGeneration()">
                    توليد الوصف الآن ✨
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function runSmartGeneration() {
        const name = document.getElementById('prodName').value;
        const specs = document.getElementById('aiSpecs').value;
        const style = document.getElementById('aiStyle').value;
        const descBox = document.getElementById('prodDesc');

        if(!name) { alert("يرجى كتابة اسم المنتج أولاً."); return; }

        // إغلاق المودال
        bootstrap.Modal.getInstance(document.getElementById('aiModal')).hide();
        descBox.value = "جاري التوليد بأسلوب " + style + "...";

        setTimeout(() => {
            let finalText = "";
            if(style === "خبير") {
                finalText = `إليك التفاصيل التقنية لـ ${name}: يتميز هذا الإصدار بمواصفات متقدمة تشمل (${specs})، مما يجعله الخيار الأمثل للمحترفين الباحثين عن دقة الأداء.`;
            } else if(style === "ودي") {
                finalText = `تبحث عن الأفضل؟ جرب ${name}! بمواصفات رائعة مثل (${specs})، حياتك بتصير أسهل. اطلبه الحين من سوقك الذكي!`;
            } else {
                finalText = `نقدم لكم ${name}، المنتج المثالي الذي يجمع بين الجودة والكفاءة. مزود بـ (${specs}) لضمان أفضل تجربة مستخدم في فئته.`;
            }
            descBox.value = finalText;
        }, 1200);
    }
</script>
{% endblock %}
