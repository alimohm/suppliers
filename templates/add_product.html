{% extends "layout.html" %}

{% block title %}رفع منتج ذكي | محجوب أونلاين{% endblock %}

{% block content %}
<style>
    .upload-card {
        background: var(--white);
        padding: 35px;
        border-radius: 30px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.02);
        max-width: 850px;
        margin: 20px auto;
        border: 1px solid #eef2f3;
    }

    .form-section-title {
        font-size: 18px;
        font-weight: 800;
        color: var(--main-p-color);
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 2px solid #f8f5ff;
        padding-bottom: 15px;
    }

    .form-control {
        width: 100%;
        padding: 14px 18px;
        border: 1px solid #eef2f3;
        border-radius: 14px;
        font-family: 'Cairo', sans-serif;
        margin-top: 10px;
        background: #fdfdfd;
        font-size: 14px;
        transition: 0.3s;
    }

    /* أداة التوليد الذكي - التصميم الجديد */
    .ai-tool-box {
        background: #f8f5ff;
        border: 1px dashed #6a11cb;
        padding: 15px;
        border-radius: 15px;
        margin-top: 15px;
        text-align: center;
    }

    .ai-gen-btn {
        background: linear-gradient(45deg, #4b0082, #6a11cb);
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .submit-btn {
        width: 100%;
        background: var(--main-p-color);
        color: white;
        border: none;
        padding: 18px;
        border-radius: 15px;
        font-weight: 800;
        font-size: 17px;
        cursor: pointer;
        margin-top: 20px;
    }

    /* تنسيق النافذة الصغيرة */
    .modal-content { border-radius: 20px; border: none; }
    .modal-header { background: #f8f5ff; border-radius: 20px 20px 0 0; }
</style>

<div class="upload-card">
    <div class="form-section-title">
        <i class="fas fa-magic"></i> إضافة منتج جديد بالنظام الذكي
    </div>

    <form id="productForm" action="{{ url_for('add_product') }}" method="POST" enctype="multipart/form-data">
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label style="font-weight: 800;">اسم المنتج</label>
                <input type="text" id="prodName" name="name" class="form-control" placeholder="مثلاً: آيفون 15 بروماكس" required>
            </div>
            <div>
                <label style="font-weight: 800;">مجموعة المنتج</label>
                <select name="category" class="form-control">
                    <option value="electronics">إلكترونيات</option>
                    <option value="fashion">أزياء</option>
                </select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
            <div>
                <label style="font-weight: 800;">السعر</label>
                <input type="number" name="price" class="form-control" placeholder="0.00" required>
            </div>
            <div>
                <label style="font-weight: 800;">العملة</label>
                <select name="currency" class="form-control">
                    <option value="SAR">ريال سعودي</option>
                    <option value="YER">ريال يمني</option>
                </select>
            </div>
            <div>
                <label style="font-weight: 800;">الكمية المتوفرة</label>
                <input type="number" name="stock" class="form-control" placeholder="مثال: 50" required>
            </div>
        </div>

        <div class="ai-tool-box">
            <p style="font-size: 12px; color: #4b0082; margin-bottom: 8px; font-weight: 700;">✨ مساعد الكتابة الذكي</p>
            <button type="button" class="ai-gen-btn" data-bs-toggle="modal" data-bs-target="#aiSpecsModal">
                <i class="fas fa-robot"></i> توليد الوصف بالمواصفات
            </button>
        </div>

        <div style="margin-top: 25px;">
            <label style="font-weight: 800;">وصف المنتج (النتيجة)</label>
            <textarea id="prodDesc" name="description" class="form-control" rows="5" placeholder="سيظهر الوصف المولد هنا..."></textarea>
        </div>

        <div style="margin-top: 25px;">
            <label style="font-weight: 800;">صور المنتج</label>
            <input type="file" name="image" class="form-control" accept="image/*">
        </div>

        <button type="submit" class="submit-btn">
            <i class="fas fa-rocket"></i> نشر المنتج للإدارة فوراً
        </button>
    </form>
</div>

<div class="modal fade" id="aiSpecsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title font-weight-bold">📝 اكتب المواصفات</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <textarea id="aiInputSpecs" class="form-control" rows="3" placeholder="مثلاً: تبريد سريع، ضمان عامين، موفر للكهرباء"></textarea>
                
                <label class="mt-3 mb-1" style="font-size: 12px; font-weight: 700;">أسلوب الكتابة:</label>
                <select id="aiStyle" class="form-control" style="padding: 8px;">
                    <option value="خبير">👨‍🏫 خبير (تركيز على المواصفات)</option>
                    <option value="احترافي">💼 احترافي (رسمي وتسويقي)</option>
                    <option value="ودي">😊 ودي (جذاب للشباب)</option>
                    <option value="بسيط">📝 بسيط (واضح ومباشر)</option>
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="ai-gen-btn w-100 justify-content-center" onclick="generateSmartDesc()">
                    توليد الآن ✨
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function generateSmartDesc() {
        const name = document.getElementById('prodName').value;
        const specs = document.getElementById('aiInputSpecs').value;
        const style = document.getElementById('aiStyle').value;
        const descBox = document.getElementById('prodDesc');

        if(!name) { alert("اكتب اسم المنتج أولاً يا بطل!"); return; }

        // إغلاق النافذة
        bootstrap.Modal.getInstance(document.getElementById('aiSpecsModal')).hide();
        descBox.value = "جاري التوليد بذكاء...";

        setTimeout(() => {
            let result = "";
            if(style === "خبير") {
                result = `إليك المواصفات الفنية لـ ${name}: يتميز هذا المنتج بـ (${specs})، حيث تم تصميمه بمعايير هندسية تضمن الأداء الأقصى والاستمرارية.`;
            } else if(style === "ودي") {
                result = `تبغى التميز؟ ${name} وصل! بـ (${specs})، بيخلي حياتك أسهل وأمتع. اطلبه الحين من سوقك الذكي.`;
            } else {
                result = `نقدم لكم ${name} المتميز بمواصفات شاملة تتضمن (${specs}). منتج يجمع بين الجودة العالية والسعر المنافس في محجوب أونلاين.`;
            }
            descBox.value = result;
        }, 1500);
    }
</script>
{% endblock %}
