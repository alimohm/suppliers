<div id="uploadProductModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; backdrop-filter: blur(10px); align-items: center; justify-content: center;">
    
    <div class="modal-content" style="background: white; width: 90%; max-width: 650px; border-radius: 25px; padding: 35px; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.3);">
        
        <div onclick="closeUploadModal()" style="position: absolute; top: 20px; left: 20px; cursor: pointer; color: #bdc3c7;">
            <i class="fas fa-times-circle fa-2x"></i>
        </div>

        <div style="text-align: center; margin-bottom: 25px;">
            <h2 style="color: var(--main-p-color); font-weight: 800; margin: 0;">رفع منتج جديد</h2>
            <p style="color: #7f8c8d; font-size: 13px; margin-top: 5px;">أضف منتجك الآن إلى مستودعات محجوب أونلاين</p>
        </div>

        <form action="/add_product" method="POST" enctype="multipart/form-data">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <input type="text" name="name" placeholder="اسم المنتج" required style="padding: 12px; border: 1px solid #eee; border-radius: 12px;">
                <input type="number" name="price" placeholder="السعر (MAH)" required style="padding: 12px; border: 1px solid #eee; border-radius: 12px;">
            </div>
            
            <textarea name="desc" placeholder="وصف المنتج..." rows="3" style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 20px;"></textarea>
            
            <button type="submit" style="width: 100%; background: var(--main-p-color); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer;">
                تأكيد الرفع والمزامنة
            </button>
        </form>
    </div>
</div>

<script>
    function openUploadModal() {
        document.getElementById('uploadProductModal').style.display = 'flex';
    }
    function closeUploadModal() {
        document.getElementById('uploadProductModal').style.display = 'none';
    }
</script>
