{% extends "layout.html" %}

{% block title %}رفع منتج جديد | محجوب أونلاين{% endblock %}

{% block content %}
<style>
    /* تنسيق حاوية الرفع لتناسب فخامة النظام */
    .upload-container {
        background: var(--white);
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        max-width: 700px;
        margin: 0 auto;
        border: 1px solid #eef2f3;
    }

    .form-header {
        text-align: center;
        margin-bottom: 35px;
    }

    .form-header i {
        font-size: 40px;
        color: var(--main-p-color);
        margin-bottom: 15px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: 700;
        margin-bottom: 10px;
        color: #2c3e50;
        font-size: 14px;
    }

    .form-control {
        width: 100%;
        padding: 14px;
        border: 2px solid #f1f1f1;
        border-radius: 12px;
        font-family: 'Cairo', sans-serif;
        transition: 0.3s;
        background: #fcfcfc;
    }

    .form-control:focus {
        border-color: var(--main-p-color);
        outline: none;
        background: #fff;
    }

    .submit-btn {
        width: 100%;
        padding: 16px;
        background: var(--main-p-color);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 8px 20px rgba(75, 0, 130, 0.15);
    }

    .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(75, 0, 130, 0.2);
    }
</style>

<div class="upload-container">
    <div class="form-header">
        <i class="fas fa-cloud-upload-alt"></i>
        <h2 style="color: var(--main-p-color); margin: 0;">إضافة منتج جديد</h2>
        <p style="color: #7f8c8d; font-size: 13px; margin-top: 5px;">أضف منتجاتك إلى "سوقك الذكي" بلمسة واحدة</p>
    </div>

    <form action="{{ url_for('add_product') }}" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>اسم المنتج</label>
            <input type="text" name="name" class="form-control" placeholder="مثلاً: هاتف ذكي سامسونج" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>السعر (MAH)</label>
                <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label>صورة المنتج</label>
                <input type="file" name="image" class="form-control" accept="image/*" required>
            </div>
        </div>

        <div class="form-group">
            <label>وصف مختصر</label>
            <textarea name="description" class="form-control" rows="3" placeholder="اكتب تفاصيل المنتج هنا..."></textarea>
        </div>

        <button type="submit" class="submit-btn">
            <i class="fas fa-check-circle" style="margin-left: 8px;"></i> اعتماد ونشر المنتج
        </button>
    </form>
</div>
{% endblock %}
