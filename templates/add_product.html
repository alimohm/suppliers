{% extends "layout.html" %}

{% block title %}رفع منتج جديد | محجوب أونلاين{% endblock %}

{% block content %}
<div class="upload-container" style="max-width: 900px; margin: 0 auto;">
    
    <div class="page-header" style="margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h2 style="margin: 0; color: var(--main-p-color); font-size: 22px;">رفع منتج جديد للسوق</h2>
            <p style="margin: 5px 0; color: #7f8c8d; font-size: 14px;">أدرج منتجاتك الآن في سلسلة الإمداد الرقمية عبر GraphQL.</p>
        </div>
        <a href="/dashboard" style="text-decoration: none; color: #7f8c8d; font-size: 14px;">
            <i class="fas fa-arrow-left"></i> العودة للرئيسية
        </a>
    </div>

    <div class="card" style="background: white; padding: 40px; border-radius: 20px; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.03);">
        <form id="productForm" action="/add_product" method="POST" enctype="multipart/form-data">
            
            <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                
                <div class="inputs-side">
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-weight: 700; margin-bottom: 10px;">اسم المنتج</label>
                        <input type="text" name="name" id="p_name" placeholder="مثلاً: هاتف ذكي X1" required 
                               style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-family: 'Cairo';">
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-weight: 700; margin-bottom: 10px;">السعر (MAH)</label>
                        <input type="number" name="price" step="0.01" placeholder="0.00" required
                               style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;">
                    </div>
                </div>

                <div class="upload-side">
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-weight: 700; margin-bottom: 10px;">صورة المنتج</label>
                        <div id="dropZone" style="border: 2px dashed #ddd; padding: 20px; border-radius: 15px; text-align: center; background: #fafafa; position: relative; overflow: hidden;">
                            <img id="imgPreview" src="#" alt="Preview" style="display: none; max-width: 100%; max-height: 150px; border-radius: 10px; margin-bottom: 10px; margin-left: auto; margin-right: auto;">
                            <div id="uploadContent">
                                <i class="fas fa-image" style="font-size: 30px; color: #bdc3c7; margin-bottom: 10px;"></i>
                                <p style="font-size: 12px; color: #7f8c8d;">اضغط أو اسحب الصورة هنا</p>
                            </div>
                            <input type="file" name="image" id="imageInput" accept="image/*" required 
                                   style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
                        </div>
                    </div>
                </div>

            </div>

            <div style="margin-top: 10px;">
                <label style="display: block; font-weight: 700; margin-bottom: 10px;">وصف المنتج</label>
                <textarea name="description" rows="4" placeholder="اكتب تفاصيل المنتج هنا لظهورها في المتجر..." 
                          style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-family: 'Cairo'; resize: none;"></textarea>
            </div>

            <hr style="margin: 30px 0; border: 0; border-top: 1px solid var(--border-color);">

            <div style="display: flex; justify-content: flex-end;">
                <button type="submit" id="submitBtn" style="background: var(--main-p-color); color: white; border: none; padding: 15px 40px; border-radius: 12px; font-weight: 700; cursor: pointer; font-family: 'Cairo'; transition: 0.3s; display: flex; align-items: center;">
                    <span id="btnIcon"><i class="fas fa-cloud-upload-alt" style="margin-left: 10px;"></i></span>
                    <span id="btnText">تأكيد الرفع والمزامنة</span>
                    <span id="btnLoader" style="display: none; margin-right: 10px;">جاري تشفير البيانات وإطلاق المزامنة... 🚀</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // معاينة الصورة والتأكد من وجودها
    document.getElementById('imageInput').onchange = function(evt) {
        const [file] = this.files;
        if (file) {
            // التحقق من الحجم (مثلاً منع أكثر من 5 ميجا لتجنب الـ Timeout في Railway)
            if (file.size > 5 * 1024 * 1024) {
                alert("❌ حجم الصورة كبير جداً، يرجى اختيار صورة أقل من 5 ميجابايت.");
                this.value = "";
                return;
            }
            document.getElementById('imgPreview').src = URL.createObjectURL(file);
            document.getElementById('imgPreview').style.display = 'block';
            document.getElementById('uploadContent').style.display = 'none';
        }
    };

    document.getElementById('productForm').onsubmit = function() {
        const btn = document.getElementById('submitBtn');
        const text = document.getElementById('btnText');
        const icon = document.getElementById('btnIcon');
        const loader = document.getElementById('btnLoader');

        btn.disabled = true;
        btn.style.opacity = '0.7';
        btn.style.cursor = 'not-allowed';

        text.style.display = 'none';
        icon.style.display = 'none';
        loader.style.display = 'inline-block';
    };
</script>
{% endblock %}
