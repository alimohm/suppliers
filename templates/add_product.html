{% extends "layout.html" %}

{% block title %}إضافة منتج | محجوب أونلاين{% endblock %}

{% block content %}
<style>
    :root {
        --royal-purple: #4b0082;
        --soft-bg: #f8f9ff;
        --gold-accent: #d4af37;
    }

    body { background-color: var(--soft-bg); font-family: 'Cairo', sans-serif; }

    .master-card {
        background: #ffffff;
        border-radius: 30px;
        padding: 40px;
        box-shadow: 0 15px 45px rgba(0,0,0,0.06);
        max-width: 1000px;
        margin: 2rem auto;
        border: 1px solid #edf2f7;
    }

    .form-label { font-weight: 800; color: #333; margin-bottom: 10px; display: block; font-size: 0.95rem; }

    .premium-input {
        width: 100%;
        padding: 14px 18px;
        border: 1.5px solid #e2e8f0;
        border-radius: 15px;
        transition: 0.3s ease;
        background: #fdfdfd;
    }

    .premium-input:focus {
        border-color: var(--royal-purple);
        box-shadow: 0 0 0 4px rgba(75, 0, 130, 0.08);
        outline: none;
    }

    /* أداة الذكاء الاصطناعي - سوقك الذكي */
    .ai-engine-container {
        background: linear-gradient(145deg, #f9f7ff, #ffffff);
        border: 2px dashed var(--royal-purple);
        border-radius: 20px;
        padding: 25px;
        margin: 30px 0;
        position: relative;
    }

    .btn-ai-generate {
        background: var(--royal-purple);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 12px;
        width: 100%;
        font-weight: 800;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-ai-generate:hover { transform: scale(1.01); box-shadow: 0 10px 20px rgba(75, 0, 130, 0.2); }

    .publish-btn {
        background: linear-gradient(135deg, var(--royal-purple), #2d004d);
        color: white;
        border: none;
        padding: 20px;
        border-radius: 18px;
        width: 100%;
        font-weight: 900;
        font-size: 1.2rem;
        cursor: pointer;
        margin-top: 20px;
    }

    /* ميزة الربط التلقائي للهوية */
    .locked-identity {
        background: #f8f9fa;
        color: var(--royal-purple);
        font-weight: 700;
        border: 1.5px solid #ddd;
        cursor: not-allowed;
    }
</style>

<div class="master-card" dir="rtl">
    <div class="text-center mb-5">
        <h3 class="fw-bold" style="color: var(--royal-purple);">✨ إدارة منتجات محجوب أونلاين</h3>
        <p class="text-muted">المنصة الأولى اللامركزية في اليمن | سوقك الذكي</p>
    </div>

    <form id="productForm" method="POST" enctype="multipart/form-data">
        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <label class="form-label">اسم المنتج</label>
                <input type="text" id="pName" name="name" class="premium-input" placeholder="مثلاً: هاتف ذكي سامسونج..." required>
            </div>
            <div class="col-md-6">
                <label class="form-label">اسم المستخدم مربوط بـ (العلامة التجارية أو المورد)</label>
                <input type="text" id="pBrandDisplay" class="premium-input locked-identity" 
                       value="{{ vendor.username }} | {{ vendor.brand_name }}" readonly>
                <input type="hidden" name="brand" value="{{ vendor.brand_name }}">
                <small class="text-muted">يتم تسجيل المنتج آلياً تحت هوية المؤسسة الموثقة.</small>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label">السعر</label>
                <input type="number" name="price" class="premium-input" placeholder="0.00" step="0.01" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">العملة</label>
                <select name="currency" class="premium-input">
                    <option value="YER">ريال يمني (YER)</option>
                    <option value="SAR">ريال سعودي (SAR)</option>
                    <option value="USD">دولار أمريكي (USD)</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">الكمية بالمخزن</label>
                <input type="number" name="stock" class="premium-input" value="1" required>
            </div>
        </div>

        <div class="ai-engine-container">
            <h6 class="fw-bold mb-3"><i class="fas fa-magic"></i> مساعد سوقك الذكي (الذكاء الاصطناعي)</h6>
            <label class="form-label small">المواصفات الأساسية (افصل بينها بفاصلة):</label>
            <textarea id="pSpecs" class="premium-input mb-3" rows="2" placeholder="مثلاً: شاشة OLED، معالج سريع، كاميرا 108MP..."></textarea>
            
            <button type="button" class="btn-ai-generate" onclick="generatePremiumDesc()">
                توليد الوصف الاحترافي ✨
            </button>
        </div>

        <div class="mb-4">
            <label class="form-label">الوصف النهائي للمنتج</label>
            <textarea id="pDesc" name="description" class="premium-input" rows="8" placeholder="سيظهر الوصف المولد هنا..."></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label">صورة المنتج</label>
            <input type="file" name="image" class="premium-input" accept="image/*" required>
        </div>

        <button type="submit" class="publish-btn">
             حفظ ونشر المنتج الآن 🚀
        </button>
    </form>
</div>

<script>
    function generatePremiumDesc() {
        const name = document.getElementById('pName').value;
        // استخراج اسم العلامة التجارية من الحقل المدمج
        const combinedIdentity = document.getElementById('pBrandDisplay').value;
        const brandName = combinedIdentity.split('|')[1]?.trim() || "مورد موثوق";
        const specs = document.getElementById('pSpecs').value;
        const target = document.getElementById('pDesc');

        if(!name || !specs) {
            alert("يرجى إدخال اسم المنتج والمواصفات أولاً."); return;
        }

        let result = `🌟 المنتج المميز: ${name}\n`;
        result += `🏢 العلامة التجارية: ${brandName}\n`;
        result += `🔗 متوفر الآن عبر "محجوب أونلاين" - سوقك الذكي 🇾🇪\n\n`;
        result += `🚀 المزايا والخصائص:\n`;
        
        specs.split('،').forEach(s => {
            if(s.trim()) result += `✅ ${s.trim()}\n`;
        });

        result += `\n🛡️ لماذا تطلب منا؟\n`;
        result += `نحن نضمن لك أصالة المنتج من خلال ${brandName} وشحن آمن عبر منصتنا اللامركزية.\n\n`;
        result += `📥 اطلب الآن واستمتع بمستقبل التسوق!`;

        target.value = result;
    }
</script>
{% endblock %}
