{% extends "vendor_layout.html" %}
{% block content %}
<div class="container py-4">
    <div class="row g-4 mb-5">
        <div class="col-md-5">
            {% include "wallet_card.html" %}
        </div>
        <div class="col-md-7">
            <div class="card h-100 bg-dark border-info shadow-sm">
                <div class="card-body p-4 text-white">
                    <h5 class="text-info mb-4"><i class="fas fa-paper-plane me-2"></i>تحويل MAH سريع</h5>
                    <form action="/action/transfer" method="POST">
                        <div class="mb-3">
                            <input type="text" name="target" class="form-control bg-dark text-white border-secondary" placeholder="رقم محفظة المستلم" required>
                        </div>
                        <div class="input-group mb-3">
                            <input type="number" step="0.01" name="amount" class="form-control bg-dark text-white border-secondary" placeholder="المبلغ" required>
                            <span class="input-group-text bg-info border-info text-black fw-bold">MAH</span>
                        </div>
                        <button type="submit" class="btn btn-info w-100 fw-bold">تأكيد الإرسال</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="text-warning">مخزنك التجاري</h4>
        <button class="btn btn-warning btn-sm fw-bold px-4" data-bs-toggle="modal" data-bs-target="#addProductModal">إضافة منتج</button>
    </div>

    <div class="row row-cols-1 row-cols-md-4 g-4">
        {% for p in products %}
        <div class="col">
            <div class="card h-100 bg-dark border-secondary">
                <img src="{{ p.image_url }}" class="card-img-top" style="height: 160px; object-fit: cover;">
                <div class="card-body text-center">
                    <h6 class="text-white">{{ p.name }}</h6>
                    <p class="text-warning fw-bold mb-0">{{ p.price }} MAH</p>
                    <small class="text-muted">الكمية: {{ p.stock }}</small>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% include "vendor_add_product.html" %}
{% endblock %}
