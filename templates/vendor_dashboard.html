{% extends "vendor_layout.html" %}

{% block content %}
<style>
    /* تصميم المحفظة البنفسجية الملكية - محجوب أونلاين */
    .wallet-container {
        background: linear-gradient(135deg, #1a0033 0%, #4b0082 100%);
        padding: 40px;
        border-radius: 30px;
        color: white;
        max-width: 500px;
        margin: 20px auto;
        position: relative;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(26, 0, 51, 0.3);
        text-align: center;
        border: 2px solid #FFD700; /* إطار ذهبي لزيادة الهيبة */
    }

    /* تأثيرات ضوئية خلفية */
    .wallet-container::after {
        content: ''; position: absolute; top: -50%; left: -50%;
        width: 100%; height: 100%; background: rgba(255,255,255,0.03);
        transform: rotate(45deg); pointer-events: none;
    }

    .balance-label { font-size: 14px; opacity: 0.8; font-weight: 600; margin-bottom: 10px; letter-spacing: 1px; }
    
    .balance-value { font-size: 42px; font-weight: 900; margin-bottom: 10px; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .balance-currency { color: #FFD700; font-size: 22px; font-weight: 800; }
    
    .wallet-id-code { 
        font-family: 'Courier New', Courier, monospace; font-size: 14px; background: rgba(0,0,0,0.3); 
        padding: 8px 20px; border-radius: 12px; display: inline-block; margin-bottom: 30px;
        color: #FFD700; border: 1px solid rgba(255,215,0,0.2);
    }

    .action-box { display: flex; flex-direction: column; align-items: center; gap: 15px; }
    
    .finger-trigger {
        width: 80px; height: 80px;
        background: #FFD700;
        border: none; border-radius: 50%;
        color: #1a0033; font-size: 32px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
        animation: pulse-gold 2s infinite;
    }

    .finger-trigger:hover {
        transform: scale(1.1) rotate(-10deg);
        background: white;
    }
    
    @keyframes pulse-gold {
        0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.6); }
        70% { box-shadow: 0 0 0 20px rgba(255, 215, 0, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
    }

    .withdraw-btn-label { color: #FFD700; font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

    .welcome-note { margin-top: 30px; color: #555; font-weight: 700; }
</style>

<div class="wallet-container">
    <div class="balance-label">رصيد محفظة السيادة الرقمية (MAH)</div>
    <div class="balance-value">
        <span class="balance-currency">MAH</span>
        {{ "{:,.2f}".format(balance) }}
    </div>

    <div class="wallet-id-code">ID: {{ wallet_no }}</div>

    <div class="action-box">
        <button class="finger-trigger" onclick="alert('شريكنا العزيز {{ username }}، طلب السحب قيد المعالجة حالياً...')">
            <i class="fas fa-fingerprint"></i>
        </button>
        <span class="withdraw-btn-label">طلب سحب فوري</span>
    </div>
</div>

<div class="welcome-note" style="text-align: center;">
    <p>مرحباً بك في برج إدارة الموردين، نحن هنا لدعم نمو أعمالك.</p>
</div>

{% endblock %}
