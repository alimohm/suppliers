<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محجوب أونلاين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; display: flex; font-family: sans-serif; background: #f4f7f6; }
        .sidebar { 
            width: 260px; height: 100vh; position: fixed; right: 0;
            background: linear-gradient(180deg, #0d001a 0%, #4b0082 50%, #0d001a 100%);
            color: white; text-align: center;
        }
        .logo { width: 90px; filter: brightness(0) invert(1); margin-top: 30px; }
        .main { margin-right: 260px; width: 100%; padding: 40px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo">
        <h3 style="margin-top:20px;">{{ vendor.owner_name }}</h3>
        <p style="color: #ffd700; font-size: 0.8rem;">مورد معتمد</p>
        <hr style="border: 0.1px solid rgba(255,255,255,0.1); margin: 20px 0;">
        <a href="/logout" style="color: #ff8080; text-decoration: none;">خروج</a>
    </aside>
    <div class="main">{% block content %}{% endblock %}</div>
</body>
</html>
