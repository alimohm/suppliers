<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محجوب أونلاين - لوحة المورد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* البنفسجي الملكي الغامق */
            --royal-purple-base: #4b0082; 
            /* الأسود الملكي */
            --royal-black: #1a0033;
            /* اللون الذهبي الفاتح للتميز */
            --gold-accent: #ffd700;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 70px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            background-color: #f8f9fa;
            transition: all 0.3s;
        }

        /* --- الشريط الجانبي (Sidebar) بتدرج ملكي غامق --- */
        .sidebar {
            width: var(--sidebar-width);
            /* التدرج: البنفسجي في المنتصف يميل للأسود في الأطراف */
            background: radial-gradient(circle at center, var(--royal-purple-base) 0%, var(--royal-black) 100%);
            color: white;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: -4px 0 15px rgba(0,0,0,0.2);
            border-left: 1px solid rgba(255,255,255,0.05); /* حد خفيف للأناقة */
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* جعل اللوجو أبيض ناصع */
        .logo-img {
            width: 80%;
            max-width: 140px;
            /* قلب الألوان لجعل الشعار أبيض بالكامل */
            filter: brightness(0) invert(1);
            border-radius: 8px;
            transition: transform 0.3s;
        }
        
        .logo-img:hover { transform: scale(1.05); }

        .nav-links {
            margin-top: 25px;
            list-style: none;
            padding: 0;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            padding: 18px 25px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-item a i {
            margin-left: 15px;
            font-size: 1.3rem;
            width: 30px;
            text-align: center;
            /* جعل الأيقونات بيضاء */
            color: rgba(255,255,255,0.8);
        }

        .nav-item a:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }
        
        .nav-item a:hover i { color: var(--gold-accent); }

        .nav-item.active a {
            background: rgba(255,255,255,0.1);
            color: white;
            border-right: 4px solid var(--gold-accent);
        }
        
        .nav-item.active a i { color: white; }

        /* --- المحتوى الرئيسي --- */
        .main-wrapper {
            margin-right: var(--sidebar-width);
            width: 100%;
            transition: all 0.3s;
        }

        .top-nav {
            background: white;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border-bottom: 1px solid #eee;
        }
        
        .top-nav h3 {
            color: var(--royal-black);
            margin: 0;
        }

        .content-area {
            padding: 40px;
        }

        /* --- التكيف مع الجوال (Responsive) --- */
        @media (max-width: 768px) {
            .sidebar { width: var(--sidebar-collapsed-width); }
            .sidebar span, .sidebar-header h2 { display: none; }
            .main-wrapper { margin-right: var(--sidebar-collapsed-width); }
            .nav-item a { justify-content: center; padding: 22px 0; }
            .nav-item a i { margin-left: 0; font-size: 1.4rem; }
            .logo-img { max-width: 40px; }
            .sidebar-header { padding: 20px 10px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" alt="Logo" class="logo-img">
            <h2 style="font-size: 1.1rem; margin-top: 15px; color: white; font-weight: normal;">لوحة المورد</h2>
        </div>
        <ul class="nav-links">
            <li class="nav-item active">
                <a href="/dashboard"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
            </li>
            <li class="nav-item">
                <a href="#"><i class="fas fa-box-open"></i> <span>المنتجات</span></a>
            </li>
            <li class="nav-item">
                <a href="#"><i class="fas fa-chart-bar"></i> <span>التقارير</span></a>
            </li>
            <li class="nav-item" style="margin-top: 60px; border-top: 1px solid rgba(255,255,255,0.05);">
                <a href="/logout" style="color: #ff8080;"><i class="fas fa-sign-out-alt"></i> <span>خروج آمن</span></a>
            </li>
        </ul>
    </aside>

    <div class="main-wrapper">
        <header class="top-nav">
            <h3>محجوب أونلاين - سوقك الذكي</h3>
            <div class="user-profile">
                <i class="fas fa-user-check" style="color: var(--royal-purple-base); font-size: 1.8rem; cursor: pointer;"></i>
            </div>
        </header>

        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
