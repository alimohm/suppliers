<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}محجوب أونلاين{% endblock %} | 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f4f7f6;
            --white: #ffffff;
            --main-p-color: #4b0082; 
            --gold: #FFD700;
            --text-dark: #2c3e50;
            --border-color: #eef2f3;
            --sidebar-width: 280px;
            --header-height: 80px;
        }

        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: var(--bg-body); color: var(--text-dark); display: flex; height: 100vh; overflow: hidden; }

        /* =========================================
           الشريط الجانبي (Sidebar)
           ========================================= */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--white);
            height: 100%;
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .brand-container {
            padding: 25px 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .logo-img { height: 50px; margin-bottom: 10px; }
        
        .brand-name { font-size: 18px; font-weight: 800; color: var(--main-p-color); display: block; }
        .brand-tagline { font-size: 13px; color: #7f8c8d; font-weight: 600; margin-bottom: 8px; display: block; }
        
        /* اسم المستخدم تحت العلامة التجارية */
        .brand-user { font-size: 12px; color: #95a5a6; display: block; background: #f8fafc; padding: 4px 10px; border-radius: 20px; width: fit-content; margin: 0 auto; }

        .menu-list { flex: 1; padding: 20px 0; overflow-y: auto; }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            text-decoration: none;
            color: #7f8c8d;
            font-size: 15px;
            font-weight: 600;
            margin: 4px 15px;
            border-radius: 12px;
            transition: 0.3s;
        }
        .menu-item i { margin-left: 15px; font-size: 18px; }
        .menu-item:hover, .menu-item.active { background-color: rgba(75,0,130,0.08); color: var(--main-p-color); }

        /* =========================================
           المحتوى العلوي (Header)
           ========================================= */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; height: 100%; }

        .top-header {
            height: var(--header-height);
            background-color: var(--white);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .platform-status { font-size: 15px; font-weight: 700; color: #2c3e50; }
        .platform-status span { color: var(--main-p-color); margin-right: 5px; font-weight: 400; }

        /* زر سحب الرصيد */
        .withdraw-btn {
            background: linear-gradient(135deg, #4b0082, #6a0dad);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'Cairo';
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(75, 0, 130, 0.2);
        }
        .withdraw-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(75, 0, 130, 0.3); }

        .page-content { flex: 1; padding: 30px; overflow-y: auto; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand-container">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" alt="محجوب أونلاين" class="logo-img">
            <span class="brand-name">محجوب أونلاين</span>
            <span class="brand-tagline">سوقك الذكي</span>
            <span class="brand-user">@{{ session.get('username', 'ali') }}</span>
        </div>

        <div class="menu-list">
            <a href="/dashboard" class="menu-item {{ 'active' if request.path == '/dashboard' }}">
                <i class="fas fa-th-large"></i>
                <span>الرئيسية</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-wallet"></i>
                <span>محفظة MAH</span>
            </a>
            <a href="/add_product" class="menu-item {{ 'active' if request.path == '/add_product' }}">
                <i class="fas fa-plus-circle"></i>
                <span>رفع منتج جديد</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-chart-pie"></i>
                <span>الإحصائيات</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-cog"></i>
                <span>إعدادات المتجر</span>
            </a>
        </div>
    </nav>

    <main class="main-wrapper">
        <header class="top-header">
            <div class="header-right">
                <div class="platform-status">
                    أهلاً بك في نظامك الإداري <span>| المنصة اللامركزية الأولى في اليمن</span>
                </div>
            </div>

            <div class="header-left" style="display: flex; align-items: center; gap: 20px;">
                <button class="withdraw-btn">
                    <i class="fas fa-arrow-down"></i> سحب الرصيد
                </button>
                
                <a href="/logout" style="color:#e74c3c; font-size: 18px;"><i class="fas fa-power-off"></i></a>
            </div>
        </header>

        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
