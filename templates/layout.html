<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محجوب أونلاين - لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --purple: #4b0082; --gold: #ffd700; }
        body { margin: 0; display: flex; background: #f4f4f9; font-family: 'Segoe UI', sans-serif; }
        .sidebar { width: 250px; background: linear-gradient(180deg, #2e004f, #0d001a); color: white; height: 100vh; position: fixed; }
        .main { margin-right: 250px; width: 100%; }
        .header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-item { padding: 15px; color: white; text-decoration: none; display: block; }
        .nav-item:hover { background: rgba(255,255,255,0.1); border-right: 4px solid var(--gold); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 30px; text-align: center; font-weight: bold; color: var(--gold);">محجوب أونلاين</div>
        <div style="padding: 10px; text-align: center; background: rgba(0,0,0,0.2);">
            <i class="fas fa-user-check"></i> {{ vendor.username }}
        </div>
        <nav style="margin-top: 20px;">
            <a href="/dashboard" class="nav-item">الرئيسية</a>
            <a href="/logout" class="nav-item" style="color: #ff7675;">خروج</a>
        </nav>
    </div>
    <div class="main">
        <header class="header">
            <span>لوحة الموردين السيادية</span>
            <span>{{ vendor.owner_name or 'مورد جديد' }} <i class="fas fa-circle-user"></i></span>
        </header>
        <div style="padding: 30px;">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
