<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}محجوب أونلاين{% endblock %} | 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f4f7f6;
            --white: #ffffff;
            --main-p-color: #4b0082;
            --gold: #FFD700;
            --text-dark: #2c3e50;
            --border-color: #eef2f3;
            --sidebar-width: 280px;
            --sidebar-collapsed-width: 80px;
            --header-height: 80px;
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: var(--bg-body); color: var(--text-dark); display: flex; height: 100vh; overflow: hidden; }

        /* =========================================
           1. الشريط الجانبي (Sidebar)
           ========================================= */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--white);
            height: 100%;
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .brand-container {
            height: 100px;
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
        }

        .logo-img { height: 45px; width: auto; object-fit: contain; }
        .brand-info { display: flex; flex-direction: column; }
        .brand-name { font-size: 17px; font-weight: 800; color: var(--main-p-color); line-height: 1.2; }
        .brand-tagline { font-size: 13px; font-weight: 600; color: #7f8c8d; }

        .menu-list { flex: 1; padding: 20px 0; overflow-y: auto; }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            text-decoration: none;
            color: #7f8c8d;
            font-size: 15px;
            font-weight: 600;
            transition: 0.3s;
            margin: 4px 15px;
            border-radius: 12px;
        }
        .menu-item i { margin-left: 15px; font-size: 18px; width: 25px; text-align: center; }
        .menu-item:hover, .menu-item.active { background-color: rgba(75,0,130,0.08); color: var(--main-p-color); }

        /* =========================================
           2. المحتوى الرئيسي والهيدر
           ========================================= */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; width: 100%; }

        .top-header {
            height: var(--header-height);
            background-color: var(--white);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            flex-wrap: nowrap;
        }

        .platform-status { font-size: 14px; font-weight: 700; color: #2c3e50; }
        .platform-status span { color: var(--main-p-color); font-weight: 600; margin-right: 5px; }

        /* تنسيق البروفايل (اسم المستخدم بجانب الأيقونة) */
        .header-profile { display: flex; align-items: center; gap: 12px; }
        
        .user-meta { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 5px 12px; border-radius: 12px; border: 1px solid var(--border-color); }
        .vendor-user { font-size: 13px; font-weight: 700; color: var(--main-p-color); }
        
        .avatar {
            width: 35px; height: 35px; border-radius: 10px;
            background: var(--main-p-color); display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px;
        }

        .page-content { flex: 1; padding: 30px; overflow-y: auto; width: 100%; }

        /* زر سحب الرصيد - يضاف برمجياً في الـ Dashboard */
        .withdraw-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .withdraw-icon-btn {
            background: var(--gold);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
            transition: 0.3s ease;
        }
        .withdraw-icon-btn:hover { transform: translateY(-3px) scale(1.05); background: #fff; }
        .withdraw-text { font-size: 11px; font-weight: 800; color: var(--gold); margin-top: 5px; }

        /* =========================================
           3. التجاوب مع الأجهزة (Responsiveness)
           ========================================= */
        
        /* التابلت والأجهزة المتوسطة */
        @media (max-width: 1024px) {
            .sidebar { width: var(--sidebar-collapsed-width); }
            .brand-info, .menu-item span { display: none; }
            .brand-container { justify-content: center; padding: 10px; }
            .menu-item { justify-content: center; margin: 5px; }
            .menu-item i { margin-left: 0; }
        }

        /* الهواتف */
        @media (max-width: 768px) {
            .top-header { padding: 0 15px; }
            .platform-status { font-size: 12px; }
            .platform-status span { display: block; margin-right: 0; margin-top: 2px; }
            .user-meta { padding: 4px 8px; }
            .vendor-user { font-size: 11px; }
            .page-content { padding: 15px; }
        }

        /* الهواتف الصغيرة جداً */
        @media (max-width: 480px) {
            .platform-status { display: none; } /* إخفاء النص الطويل في الشاشات الصغيرة جداً لتوفير مساحة */
            .sidebar { position: fixed; left: auto; right: 0; height: 100%; } /* تثبيت السايدبار في الموبايل */
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand-container">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" alt="محجوب أونلاين" class="logo-img">
            <div class="brand-info">
                <span class="brand-name">محجوب أونلاين</span>
                <span class="brand-tagline">سوقك الذكي</span>
            </div>
        </div>

        <div class="menu-list">
            <a href="/dashboard" class="menu-item {{ 'active' if request.path == '/dashboard' }}">
                <i class="fas fa-th-large"></i>
                <span>الرئيسية</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-wallet"></i>
                <span>محفظة MAH</span>
            </a>
            <a href="/add_product" class="menu-item {{ 'active' if request.path == '/add_product' }}">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>رفع منتج جديد</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-chart-line"></i>
                <span>الإحصائيات</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-user-gear"></i>
                <span>إعدادات المتجر</span>
            </a>
        </div>
    </nav>

    <main class="main-wrapper">
        <header class="top-header">
            <div class="header-right">
                <div class="platform-status">
                    أهلاً بك في نظامك الإداري <span>| المنصة اللامركزية الأولى في اليمن</span>
                </div>
            </div>

            <div class="header-profile">
                <div class="user-meta">
                    <span class="vendor-user">@{{ session.get('username', 'ali') }}</span>
                    <div class="avatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                <a href="/logout" style="color:#e74c3c; margin-right:5px; font-size: 18px;"><i class="fas fa-power-off"></i></a>
            </div>
        </header>

        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
