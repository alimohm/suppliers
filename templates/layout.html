<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}محجوب أونلاين | لوحة التحكم{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f4f7f6;
            --white: #ffffff;
            --main-p-color: #4b0082;
            --gold: #FFD700;
            --sidebar-width: 280px;
            --sidebar-collapsed: 85px;
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg-body); display: flex; height: 100vh; overflow: hidden; }

        /* --- السايدبار الذكي --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            height: 100%;
            border-left: 1px solid #eef2f3;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        /* منطقة اللوجو مع النص (بناءً على طلبك) */
        .brand-container {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f1f1f1;
        }
        .logo-img { height: 45px; flex-shrink: 0; }
        .brand-details { display: flex; flex-direction: column; line-height: 1.2; }
        .brand-name { font-weight: 800; color: var(--main-p-color); font-size: 14px; }
        .brand-sub { font-size: 10px; color: #888; font-weight: 600; }

        .menu-list { flex: 1; padding: 20px 0; }
        .menu-item {
            display: flex; align-items: center; padding: 12px 18px;
            text-decoration: none; color: #7f8c8d; font-weight: 700;
            margin: 5px 15px; border-radius: 12px; transition: 0.3s;
            white-space: nowrap;
        }
        .menu-item i { font-size: 18px; min-width: 30px; text-align: center; margin-left: 12px; }
        .menu-item.active { background: rgba(75,0,130,0.08); color: var(--main-p-color); }

        /* --- الهيكل الرئيسي --- */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* الهيدر العلوي مع الرسالة الترحيبية */
        .top-header {
            height: 80px;
            background: var(--white);
            border-bottom: 1px solid #eef2f3;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px;
        }

        .welcome-msg { 
            font-size: 14px; font-weight: 700; color: #2c3e50; 
            border-right: 4px solid var(--main-p-color); padding-right: 15px;
        }
        .welcome-msg span { color: var(--main-p-color); }

        .user-section { display: flex; align-items: center; gap: 15px; }
        .user-pill {
            display: flex; align-items: center; gap: 10px;
            background: #f8fafc; padding: 6px 15px; border-radius: 50px;
            border: 1px solid #eef2f3;
        }

        .page-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* --- استجابة الشاشات (Dynamic Responsive) --- */
        @media (max-width: 1024px) {
            .sidebar { width: var(--sidebar-collapsed); }
            .brand-details, .menu-item span { display: none; }
            .brand-container { justify-content: center; padding: 15px 5px; }
            .menu-item { justify-content: center; margin: 5px 10px; padding: 12px 0; }
            .menu-item i { margin-left: 0; }
        }

        @media (max-width: 768px) {
            .welcome-msg { font-size: 12px; padding-right: 10px; }
            .top-header { padding: 0 15px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand-container">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-img">
            <div class="brand-details">
                <span class="brand-name">محجوب أونلاين | سوقك الذكي</span>
                <span class="brand-sub">لوحتك الإدارية اللامكرزية</span>
            </div>
        </div>

        <div class="menu-list">
            <a href="{{ url_for('dashboard') }}" class="menu-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                <i class="fas fa-th-large"></i><span>الرئيسية</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-wallet"></i><span>محفظة MAH</span>
            </a>
            <a href="{{ url_for('add_product') }}" class="menu-item {% if request.endpoint == 'add_product' %}active{% endif %}">
                <i class="fas fa-plus-circle"></i><span>رفع منتج</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-cog"></i><span>الإعدادات</span>
            </a>
        </div>
    </nav>

    <main class="main-wrapper">
        <header class="top-header">
            <div class="welcome-msg">
                مرحباً في نظامك الإداري | <span>المنصة اللامركزية الأولى في اليمن</span>
            </div>

            <div class="user-section">
                <div class="user-pill">
                    <span style="font-size: 13px; font-weight: 800; color: var(--main-p-color);">@ali</span>
                    <i class="fas fa-user-circle fa-lg" style="color: var(--main-p-color);"></i>
                </div>
                <a href="#" style="color:#e74c3c;"><i class="fas fa-power-off"></i></a>
            </div>
        </header>

        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
