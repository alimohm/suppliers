<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محجوب أونلاين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #4b0082; --b: #0d001a; --g: #ffd700; }
        body { margin: 0; display: flex; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; }
        
        /* شريط جانبي ملكي */
        .sidebar {
            width: 260px; height: 100vh; position: fixed; right: 0;
            background: linear-gradient(180deg, var(--b) 0%, var(--p) 50%, var(--b) 100%);
            color: white; z-index: 1000;
        }
        .sidebar-header { padding: 30px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-img { width: 90px; filter: brightness(0) invert(1); } /* لوجو أبيض */
        
        .nav-links { list-style: none; padding: 20px 0; }
        .nav-links a { display: flex; align-items: center; padding: 15px 25px; color: rgba(255,255,255,0.7); text-decoration: none; }
        .nav-links a:hover, .active { background: rgba(255,255,255,0.1); color: white; border-right: 4px solid var(--g); }

        .main { margin-right: 260px; width: 100%; padding: 25px; transition: 0.3s; }
        /* منطق إخفاء الشريط في صفحة الدخول */
        .hide-sidebar .sidebar { display: none; }
        .hide-sidebar .main { margin-right: 0; }
    </style>
</head>
<body class="{% if not session.get('vendor_id') %}hide-sidebar{% endif %}">
    {% if session.get('vendor_id') %}
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-img">
            <div style="margin-top:15px; font-weight:bold;">{{ vendor.owner_name }}</div>
            <small style="color:var(--g)">مورد معتمد</small>
        </div>
        <ul class="nav-links">
            <li class="active"><a href="/dashboard"><i class="fas fa-home" style="margin-left:10px"></i> الرئيسية</a></li>
            <li><a href="/logout" style="color:#ff8080"><i class="fas fa-sign-out-alt" style="margin-left:10px"></i> خروج</a></li>
        </ul>
    </aside>
    {% endif %}
    <div class="main">{% block content %}{% endblock %}</div>
</body>
</html>
