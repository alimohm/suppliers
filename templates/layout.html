<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محجوب أونلاين</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p-purple: #4b0082; --p-black: #0d001a; --p-gold: #ffd700; }
        body { background: #f4f7fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Sidebar المتجاوب */
        .sidebar {
            width: 280px; height: 100vh; position: fixed; right: 0; top: 0;
            background: linear-gradient(180deg, var(--p-black) 0%, var(--p-purple) 50%, var(--p-black) 100%);
            color: white; z-index: 1050; transition: transform 0.3s ease;
        }
        
        /* تنسيق الجوال: إخفاء القائمة في البداية */
        @media (max-width: 991.98px) {
            .sidebar { transform: translateX(100%); width: 100%; max-width: 320px; }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-right: 0 !important; }
            .top-bar-user { display: none !important; } /* إخفاء الاسم الطويل على الجوال */
        }
        
        .nav-link { color: rgba(255,255,255,0.7); border-right: 4px solid transparent; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.05); color: white; border-right-color: var(--p-gold); }
        .nav-link i { margin-left: 10px; width: 25px; text-align: center; }

        .logo-img { width: 100px; filter: brightness(0) invert(1); }
        .main-content { margin-right: 280px; min-height: 100vh; padding: 20px; transition: 0.3s; }
        
        .top-bar { background: white; height: 70px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebarMenu">
        <div class="p-4 text-center">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-img" alt="logo">
            <h5 class="mt-3 text-white">{{ vendor.owner_name }}</h5>
            <small class="text-warning"><i class="fas fa-certificate"></i> مورد معتمد</small>
            <button class="btn-close btn-close-white d-lg-none position-absolute top-0 start-0 m-3" onclick="toggleSidebar()"></button>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link active" href="/dashboard"><i class="fas fa-home"></i> الرئيسية</a></li>
            <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-boxes"></i> المنتجات</a></li>
            <li class="nav-item mt-auto"><a class="nav-link text-danger" href="/logout"><i class="fas fa-sign-out-alt"></i> خروج</a></li>
        </ul>
    </aside>

    <div class="main-content">
        <header class="top-bar rounded-3">
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-purple d-lg-none me-2" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="h5 m-0 text-purple fw-bold">محجوب أونلاين | <span class="text-muted fw-normal">سوقك الذكي</span></div>
            </div>
            <div class="top-bar-user d-flex align-items-center gap-2">
                <span class="text-muted small">مرحباً، {{ vendor.owner_name }}</span>
                <div class="p-avatar"><i class="fas fa-user"></i></div>
            </div>
        </header>
        <div class="mt-4">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebarMenu').classList.toggle('show');
        }
    </style>
</body>
</html>
