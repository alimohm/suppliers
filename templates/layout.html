<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}محجوب أونلاين{% endblock %} | 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f7f8f9; /* نفس لون الخلفية في Qumra */
            --white: #ffffff;
            --main-p-color: #4b0082; /* أرجواني ملكي - هوية محجوب */
            --gold: #FFD700;
            --text-dark: #333333;
            --border-color: #e6e6e6;
            --sidebar-width: 250px;
            --sidebar-collapsed-width: 70px;
            --header-height: 70px;
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: var(--bg-body); color: var(--text-dark); display: flex; height: 100vh; overflow: hidden; }

        /* =========================================
           2. الشريط الجانبي (Sidebar) - الهيكل الثابت
           ========================================= */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--white);
            height: 100%;
            border-left: 1px solid var(--border-color); /* بما أننا RTL فالحدود على اليسار */
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1000;
        }

        /* حاوية الشعار - نفس مكان Qumra */
        .brand-container {
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        /* شعار محجوب أونلاين - بحجم متناسق */
        .logo-img {
            max-width: 140px; /* حجم متناسق مكان Qumra */
            height: auto;
            max-height: 50px;
            object-fit: contain;
            transition: all 0.3s ease;
        }

        /* قائمة الروابط */
        .menu-list { flex: 1; padding: 20px 0; overflow-y: auto; }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            text-decoration: none;
            color: var(--text-dark);
            font-size: 15px;
            font-weight: 600;
            transition: 0.2s;
            position: relative;
        }
        .menu-item i { margin-left: 15px; font-size: 18px; color: #7f8c8d; width: 20px; text-align: center; }
        .menu-item:hover, .menu-item.active { background-color: rgba(75,0,130,0.05); color: var(--main-p-color); }
        .menu-item.active i { color: var(--main-p-color); }

        /* =========================================
           3. المحتوى الرئيسي (Header + Content)
           ========================================= */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; height: 100%; }

        /* الهيدر العلوي */
        .top-header {
            height: var(--header-height);
            background-color: var(--white);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .header-icon { font-size: 20px; color: #7f8c8d; cursor: pointer; }

        /* محتوى الصفحة المتغير - يتم حقنه هنا */
        .page-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* =========================================
           4. التجاوب (Mobile Responsive)
           ========================================= */
        @media (max-width: 991px) {
            :root { --sidebar-width: var(--sidebar-collapsed-width); }
            
            /* إخفاء النص، ترك الأيقونات فقط - نفس Qumra mobile */
            .menu-item span, .brand-container span { display: none; }
            
            .menu-item { justify-content: center; padding: 15px 0; }
            .menu-item i { margin-left: 0; font-size: 22px; }

            /* ضبط الشعار للأجهزة الصغيرة */
            .logo-img { max-width: 40px; max-height: 40px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand-container">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" alt="محجوب أونلاين" class="logo-img">
        </div>

        <div class="menu-list">
            <a href="/dashboard" class="menu-item active">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="/products" class="menu-item">
                <i class="fas fa-boxes"></i>
                <span>إدارة المنتجات</span>
            </a>
            <a href="/orders" class="menu-item">
                <i class="fas fa-receipt"></i>
                <span>الطلبات</span>
            </a>
            <a href="/wallet" class="menu-item">
                <i class="fas fa-wallet"></i>
                <span>محفظة MQ</span>
            </a>
            <a href="/settings" class="menu-item">
                <i class="fas fa-cog"></i>
                <span>الإعدادات السيادية</span>
            </a>
        </div>
    </nav>

    <main class="main-wrapper">
        <header class="top-header">
            <div class="header-right">
                <i class="fas fa-bars header-icon" style="margin-right: 15px;"></i>
                <strong>بوابة حوكمة الموردين</strong>
            </div>
            <div class="header-actions">
                <i class="far fa-bell header-icon"></i>
                <div class="user-profile" style="display:flex; align-items:center; gap:10px;">
                    <span style="font-weight:600;">{{ session['brand_name'] }}</span>
                    <i class="fas fa-user-circle" style="font-size:30px; color:var(--main-p-color);"></i>
                    <a href="/logout" class="header-icon" title="خروج سيادي"><i class="fas fa-sign-out-alt"></i></a>
                </div>
            </div>
        </header>

        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
