<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <style>
        body { background: #0d001a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        .login-card { background: #1a0033; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 12px; background: #4b0082; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>تسجيل الدخول</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit">دخول للمنصة</button>
        </form>
    </div>
</body>
</html>
