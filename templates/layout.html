<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}محجوب أونلاين{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f8fafb;
            --white: #ffffff;
            --main-p-color: #4b0082;
            --gold: #FFD700;
            --sidebar-width: 280px;
            --border-color: #eef2f3;
        }

        body { 
            margin: 0; 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-body); 
            color: #2c3e50; 
        }
        
        .main-layout { 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .sidebar { 
            width: var(--sidebar-width); 
            background: var(--white); 
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .main-wrapper { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .page-content { 
            flex: 1; 
            padding: 30px; 
            overflow-y: auto; 
        }

        .menu-list {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            display: flex; 
            align-items: center; 
            gap: 15px;
            padding: 15px 25px; 
            text-decoration: none; 
            color: #7f8c8d;
            transition: 0.3s; 
            font-weight: 600;
        }

        .menu-item:hover, .menu-item.active {
            background: #f8faff; 
            color: var(--main-p-color);
            border-right: 4px solid var(--main-p-color);
        }

        @media (max-width: 768px) {
            .sidebar { 
                position: absolute;
                right: -100%;
                transition: 0.3s;
            }
            .sidebar.active { right: 0; }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        {% if session.get('username') %}
        <nav class="sidebar">
            <div style="padding: 30px; text-align: center;">
                <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" 
                     alt="Logo" 
                     style="height: 45px; object-fit: contain;">
            </div>
            
            <div class="menu-list">
                <a href="{{ url_for('dashboard') }}" class="menu-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                    <i class="fas fa-th-large"></i> لوحة الحوكمة
                </a>
                <a href="{{ url_for('add_product') }}" class="menu-item {% if request.endpoint == 'add_product' %}active{% endif %}">
                    <i class="fas fa-plus-circle"></i> إضافة منتج
                </a>
                
                <div style="margin-top: auto; border-top: 1px solid var(--border-color);">
                    <a href="{{ url_for('logout_route') }}" class="menu-item" style="color: #e74c3c;">
                        <i class="fas fa-power-off"></i> خروج آمن
                    </a>
                </div>
            </div>
        </nav>
        {% endif %}

        <main class="main-wrapper">
            <div class="page-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        console.log("تَمَّ تَحْمِيلُ هَيْكَلِ مَحْجُوب أُونْلَايْن بِنَجَاح ✅");
    </script>
</body>
</html>
