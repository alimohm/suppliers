<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | سوقك الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --royal-purple: #6A0DAD; --gold: #D4AF37; --bg: #000; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; display: flex; }
        
        /* شريط جانبي احترافي متجاوب */
        .sidebar { width: 260px; height: 100vh; background: #0a0a0a; border-left: 1px solid var(--gold); position: fixed; right: 0; display: flex; flex-direction: column; }
        .main-content { margin-right: 260px; width: 100%; padding: 30px; min-height: 100vh; }
        
        .nav-item { padding: 15px 25px; color: #aaa; text-decoration: none; display: flex; align-items: center; }
        .nav-item.active { background: var(--royal-purple); color: #fff; }
        .nav-item i { margin-left: 15px; }

        .profile-card { border: 1px solid var(--gold); border-radius: 15px; padding: 25px; background: rgba(212, 175, 55, 0.05); margin-bottom: 30px; }
        .status-badge { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }

        /* التوافق مع الجوال */
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 65px; bottom: 0; top: auto; flex-direction: row; border-left: none; border-top: 1px solid var(--gold); }
            .sidebar .nav-item { flex: 1; justify-content: center; padding: 10px; font-size: 0.8rem; flex-direction: column; }
            .sidebar .nav-item i { margin-left: 0; margin-bottom: 5px; }
            .sidebar span { font-size: 0.6rem; }
            .main-content { margin-right: 0; margin-bottom: 70px; padding: 15px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div style="padding: 20px; text-align: center; border-bottom: 1px solid #222;" class="hide-mobile">
            <h2 style="color: var(--gold); font-size: 1.2rem; margin: 0;">سوقك الذكي</h2>
        </div>
        <a href="#" class="nav-item active"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
        <a href="#" class="nav-item"><i class="fas fa-box"></i> <span>منتجاتي</span></a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i> <span>المحفظة</span></a>
        <a href="/logout" class="nav-item" style="color: #ff4444; margin-top: auto;"><i class="fas fa-sign-out-alt"></i> <span>تسجيل الخروج</span></a>
    </nav>

    <main class="main-content">
        <div class="profile-card">
            <h1 style="margin: 0; font-size: 1.5rem;">مرحباً، {{ session['vendor_name'] }} 👋</h1>
            <p style="color: #888; margin: 10px 0;">المحفظة الرقمية: <span style="color: var(--gold);">{{ session['wallet'] }}</span></p>
            <span class="status-badge">عضو نشط في النظام اللامركزي</span>
        </div>

        <h3 style="border-right: 4px solid var(--gold); padding-right: 15px; margin-top: 40px;">📦 حالة المنتجات المرفوعة</h3>
        
        <div style="text-align: center; padding: 50px; border: 1px dashed #333; border-radius: 20px; color: #666;">
            <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; margin-bottom: 15px;"></i>
            <p>لا توجد منتجات مرفوعة حالياً. ابدأ برفع أول منتج إلى متجر قمرة عبر زر الإضافة.</p>
        </div>
    </main>

</body>
</html>
