{% extends "layout.html" %}

{% block content %}
<div class="alert-box">
    فشل الربط التقني مع قمرة، تحقق من الـ API Key والرابط.
</div>

<div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);">
    <h1 style="color: var(--main-purple);">أهلاً بك، {{ vendor.owner_name or vendor.username }} 👋</h1>
    <p style="color: #666;">الهيكل جاهز الآن. يمكنك البدء بتركيب النوافذ البرمجية هنا.</p>
    
    <div style="margin-top: 30px; border: 2px dashed #ddd; padding: 50px; text-align: center; color: #aaa; border-radius: 15px;">
        <i class="fas fa-plus-circle" style="font-size: 3rem; margin-bottom: 15px; display: block;"></i>
        نافذة جديدة (قيد التركيب)
    </div>
</div>
{% endblock %}
