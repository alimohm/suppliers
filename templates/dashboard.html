<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | محجوب أونلاين</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .card { background: #141417; padding: 25px; border-radius: 15px; border: 1px solid #333; margin-top: 30px; max-width: 500px; }
        .btn-add { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2>أهلاً، {{ session['user'] }}</h2>
        <div style="color: #8a2be2; font-weight: bold;">Mahjoub Smart Market</div>
    </div>
    
    <div class="card">
        <h3>رفع منتج جديد</h3>
        <p style="color: #888; font-size: 14px;">سيتم إضافة نسبة 40% تلقائياً للسعر النهائي.</p>
        <form action="/dashboard" method="post">
            <input type="text" name="p_name" placeholder="اسم المنتج (مثلاً: معوز تهامي)" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #333; background:#000; color:white;">
            <input type="number" name="p_price" placeholder="السعر الأساسي" style="width:100%; padding:10px; margin-bottom:20px; border-radius:5px; border:1px solid #333; background:#000; color:white;">
            <button type="submit" class="btn-add">إرسال لمتجر قمرة</button>
        </form>
    </div>
</body>
</html>
