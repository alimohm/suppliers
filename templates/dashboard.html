{% extends "layout.html" %}
{% block content %}
<div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
    <h1 style="color: #4b0082; margin-top:0;">مرحباً بك، {{ vendor.owner_name }} 👋</h1>
    <p style="color: #666; font-size: 1.1rem;">أهلاً بك في لوحة تحكم موردين منصة محجوب أونلاين.</p>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;">
        <div style="background: #f8f0ff; padding: 25px; border-radius: 15px; border-right: 6px solid #4b0082;">
            <span style="color:#888; font-size:0.9rem;">عنوان المحفظة</span>
            <div style="font-size:1.3rem; font-weight:bold; color:#4b0082; margin-top:10px;">{{ vendor.wallet_address }}</div>
        </div>
    </div>
</div>
{% endblock %}
