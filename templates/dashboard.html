<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الموردين | محجوب أونلاين</title>
    <style>
        :root { --purple: #7b2cbf; --black: #0a0a0a; }
        body { font-family: sans-serif; background: var(--black); color: white; margin: 0; }
        .top-bar { background: #1a1a1a; padding: 15px; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: #151515; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .btn { background: var(--purple); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #222; padding: 10px; text-align: right; }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>[ Mahjoub Online ] Smart Market</span>
        <span>مرحباً، المورد رقم #1</span>
    </div>

    <div class="container">
        <div class="card">
            <h3>المحفظة اللامركزية</h3>
            <h2 style="color: var(--purple);">0.00 YER</h2>
            <p style="font-size: 12px; color: #888;">الرصيد مربوط تلقائياً بطلبات قُمرة</p>
        </div>

        <div class="card">
            <h3>إضافة منتج جديد للمتجر</h3>
            <button class="btn" onclick="alert('فتح نموذج الإضافة')">+ إضافة منتج جديد</button>
        </div>

        <div class="card">
            <h3>حالة المنتجات على قُمرة</h3>
            <table>
                <thead>
                    <tr>
                        <th>المنتج</th>
                        <th>المخزون</th>
                        <th>الحالة على المتجر</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>معوز بيضاني</td>
                        <td>15</td>
                        <td style="color: #4caf50;">منشور (Live)</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
