<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المسؤول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; display: flex; align-items: center; height: 100vh; }
        .login-box { background: #111; border: 1px solid #f39c12; padding: 40px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="col-md-4 mx-auto login-box shadow-lg">
            <h3 class="text-center text-warning mb-4 fw-bold">MAHJOUB SYSTEM</h3>
            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control bg-dark text-white border-secondary" placeholder="اليوزر">
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary" placeholder="كلمة المرور">
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold py-2">تسجيل الدخول</button>
            </form>
        </div>
    </div>
</body>
</html>
