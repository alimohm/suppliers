{% extends "admin_layout.html" %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="text-warning"><i class="fas fa-user-check me-2"></i>مركز اعتماد الموردين</h4>
        <span class="badge bg-secondary">سجل التراخيص</span>
    </div>

    <div class="card bg-dark border-warning mb-5">
        <div class="card-header border-warning text-warning fw-bold">تأسيس كيان تجاري جديد</div>
        <div class="card-body">
            <form action="/action/add-vendor" method="POST" class="row g-3">
                <div class="col-md-3">
                    <label class="small text-muted">اسم المتجر / العلامة</label>
                    <input type="text" name="brand" class="form-control bg-black text-white border-secondary" required>
                </div>
                <div class="col-md-3">
                    <label class="small text-muted">اسم المستخدم (Login)</label>
                    <input type="text" name="user" class="form-control bg-black text-white border-secondary" required>
                </div>
                <div class="col-md-3">
                    <label class="small text-muted">كلمة المرور المؤقتة</label>
                    <input type="password" name="pwd" class="form-control bg-black text-white border-secondary" required>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-warning w-100 fw-bold">إصدار ترخيص وتفعيل</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
