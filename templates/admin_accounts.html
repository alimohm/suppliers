{% extends "admin_layout.html" %}
{% block content %}
<div class="card-mah p-4 shadow-sm mb-4">
    <h5 class="text-mah mb-4"><i class="fas fa-plus-circle me-2"></i>تأسيس مورد سيادي جديد</h5>
    <form action="/action/add-vendor" method="POST" class="row g-3">
        <div class="col-md-4">
            <input type="text" name="brand" class="form-control bg-dark text-white border-secondary" placeholder="اسم المتجر" required>
        </div>
        <div class="col-md-3">
            <input type="text" name="user" class="form-control bg-dark text-white border-secondary" placeholder="اسم المستخدم" required>
        </div>
        <div class="col-md-3">
            <input type="password" name="pwd" class="form-control bg-dark text-white border-secondary" placeholder="كلمة المرور" required>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-warning w-100 fw-bold">تفعيل</button>
        </div>
    </form>
</div>

<div class="card-mah p-4">
    <h5 class="text-muted mb-3">سجل الموردين المعتمدين</h5>
    <div class="table-responsive">
        <table class="table table-dark table-hover">
            <thead>
                <tr class="text-mah">
                    <th>المتجر</th>
                    <th>رقم المحفظة</th>
                    <th>الرصيد</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody>
                {% for v in vendors %}
                <tr>
                    <td>{{ v.brand_name }}</td>
                    <td class="text-info">{{ v.wallet.wallet_number }}</td>
                    <td class="text-success">{{ v.wallet.balance }} MAH</td>
                    <td><span class="badge bg-success">نشط</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
