{% extends "layout.html" %}

{% block title %}برج المراقبة | الإدارة المركزية{% endblock %}

{% block content %}
<div class="admin-welcome" style="background: white; padding: 30px; border-radius: 20px; border-right: 5px solid #FFD700; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
    <h2 style="color: #1a0033;"><i class="fas fa-shield-check"></i> أهلاً بك في برج المراقبة</h2>
    <p style="color: #666;">أنت الآن تتحكم بكامل مفاصل منصة <b>محجوب أونلاين</b> السيادية.</p>
    
    <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px;">
        <div style="background: #f8f9fa; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #eee;">
            <i class="fas fa-users" style="font-size: 25px; color: #4b0082;"></i>
            <h4 style="margin: 10px 0;">الموردين النشطين</h4>
            <span style="font-size: 24px; font-weight: 800;">5</span>
        </div>

        <div style="background: #f8f9fa; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #eee;">
            <i class="fas fa-box-open" style="font-size: 25px; color: #4b0082;"></i>
            <h4 style="margin: 10px 0;">منتجات قيد المراجعة</h4>
            <span style="font-size: 24px; font-weight: 800; color: #e74c3c;">12</span>
        </div>
    </div>
</div>
{% endblock %}
