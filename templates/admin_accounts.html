{% extends "admin_layout.html" %}
{% block content %}
<div class="container py-4">
    <div class="card bg-dark border-warning shadow mb-5">
        <div class="card-header border-warning text-warning fw-bold">
            <i class="fas fa-user-plus me-2"></i>تأسيس كيان تجاري جديد
        </div>
        <div class="card-body">
            <form action="/action/add-vendor" method="POST">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="text-muted small mb-1">اسم العلامة التجارية</label>
                        <input type="text" name="brand" class="form-control bg-dark border-secondary text-white" placeholder="مثال: متجر النور" required>
                    </div>
                    <div class="col-md-4">
                        <label class="text-muted small mb-1">اسم المستخدم</label>
                        <input type="text" name="user" class="form-control bg-dark border-secondary text-white" required>
                    </div>
                    <div class="col-md-4">
                        <label class="text-muted small mb-1">كلمة المرور</label>
                        <input type="password" name="pwd" class="form-control bg-dark border-secondary text-white" required>
                    </div>
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-warning w-100 fw-bold py-2">تفعيل المورد وإصدار المحفظة</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
