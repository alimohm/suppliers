<div class="upload-card" style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 700px; margin: 20px auto; border: 1px solid #eee;">
    
    <div style="text-align: center; margin-bottom: 25px;">
        <i class="fas fa-plus-circle" style="font-size: 3rem; color: #4b0082; margin-bottom: 15px;"></i>
        <h2 style="color: #2e004f; margin: 0;">إضافة منتج جديد</h2>
        <p style="color: #888; font-size: 0.9rem;">سيتم تحويل السعر وإضافة ربحك بنسبة 30% تلقائياً 🚀</p>
    </div>

    <form action="/add_product" method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 15px;">
        
        <div>
            <label style="display: block; margin-bottom: 8px; color: #4b0082; font-weight: 600;">اسم المنتج:</label>
            <input type="text" name="name" required placeholder="أدخل اسم المنتج بوضوح..." 
                   style="width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; outline: none; transition: 0.3s;"
                   onfocus="this.style.borderColor='#4b0082'">
        </div>

        <div>
            <label style="display: block; margin-bottom: 8px; color: #4b0082; font-weight: 600;">وصف المنتج:</label>
            <textarea name="description" rows="3" placeholder="اكتب وصفاً جذاباً لرفع هرمون الشراء لدى العميل..." 
                      style="width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; outline: none; transition: 0.3s;"
                      onfocus="this.style.borderColor='#4b0082'"></textarea>
        </div>

        <div style="display: flex; gap: 15px; align-items: flex-end;">
            <div style="flex: 2;">
                <label style="display: block; margin-bottom: 8px; color: #4b0082; font-weight: 600;">السعر الأصلي:</label>
                <input type="number" name="price" step="0.01" required placeholder="0.00" 
                       style="width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; outline: none;">
            </div>
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; color: #4b0082; font-weight: 600;">العملة:</label>
                <select name="currency" style="width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; background: #fff; cursor: pointer;">
                    <option value="SAR">ريال سعودي (SAR)</option>
                    <option value="USD">دولار أمريكي (USD)</option>
                </select>
            </div>
        </div>

        <div style="margin-top: 10px;">
            <label style="display: block; margin-bottom: 8px; color: #4b0082; font-weight: 600;">صورة المنتج:</label>
            <div style="position: relative; border: 2px dashed #d1c4e9; padding: 20px; border-radius: 12px; text-align: center; background: #f9f7ff;">
                <input type="file" name="image" accept="image/*" required 
                       style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer;">
                <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #7e57c2; margin-bottom: 10px;"></i>
                <p style="margin: 0; color: #7e57c2; font-size: 0.9rem;">اسحب الصورة هنا أو اضغط للاختيار</p>
                <small style="color: #aaa;">(سيتم تحويلها لـ WebP لرفع الـ SEO)</small>
            </div>
        </div>

        <button type="submit" style="margin-top: 15px; padding: 15px; background: linear-gradient(45deg, #4b0082, #6a1b9a); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.4s; box-shadow: 0 4px 15px rgba(75, 0, 130, 0.3);"
                onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(75, 0, 130, 0.4)';"
                onmouseout="this.style.transform='translateY(0)';">
            <i class="fas fa-rocket" style="margin-left: 8px;"></i> نشر المنتج في المنصة
        </button>

    </form>
</div>
