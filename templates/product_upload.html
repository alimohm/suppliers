<div class="card" style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
    <h4 style="color: var(--p-color); margin-bottom: 25px;"><i class="fas fa-upload"></i> بوابة رفع المنتجات الذكية</h4>
    
    <form action="{{ url_for('add_product') }}" method="POST" enctype="multipart/form-data">
        <div style="margin-bottom: 15px;">
            <label>اسم المنتج</label>
            <input type="text" name="name" required style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label>السعر الأساسي ($)</label>
            <input type="number" name="price" required style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd;">
            <small style="color: #666;">* سيتم إضافة 30% تلقائياً عبر finance.py</small>
        </div>

        <div style="margin-bottom: 20px;">
            <label>صورة المنتج</label>
            <input type="file" name="image" required style="display:block; margin-top:5px;">
        </div>

        <button type="submit" style="width:100%; padding:15px; background:var(--p-color); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">
            نشر المنتج والتحقق من الاتصال
        </button>
    </form>
</div>
