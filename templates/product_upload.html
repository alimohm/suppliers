<input type="hidden" name="vendor_id" value="1"> <script>
document.querySelector('form').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    
    // حساب السعر النهائي بزيادة 30% كما طلبت في الوصف
    const originalPrice = parseFloat(formData.get('price'));
    const finalPrice = originalPrice * 1.30;

    // استعلام GraphQL المتوافق مع Schema التي رأيناها في Visualization
    const mutation = `
        mutation {
            createProduct(input: {
                name: "${formData.get('name')}",
                description: "${formData.get('description')}",
                price: ${finalPrice},
                vendorId: "${formData.get('vendor_id')}"
            }) {
                success
                message
            }
        }
    `;

    try {
        const response = await fetch('https://mahjoub.online/admin/graphql', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apollo-require-preflight': 'true', // الحل الذي أصلحناه سابقاً
                'Authorization': 'Bearer qmr_e235dd03' // التوكن الخاص بك
            },
            body: JSON.stringify({ query: mutation })
        });
        
        const result = await response.json();
        if(result.data.createProduct.success) {
            alert("🚀 تم نشر المنتج بنجاح في منصة محجوب أونلاين!");
        }
    } catch (error) {
        console.error("خطأ في الرفع:", error);
    }
};
</script>
